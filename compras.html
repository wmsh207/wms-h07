<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Compras | WMS H-07</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        
        body { background-color: #f4f7fe; font-family: 'Inter', sans-serif; padding-bottom: 70px; }

        .main-header {
            background: linear-gradient(135deg, #034EA1 0%, #007bff 100%);
            padding: 30px 20px 60px;
            border-radius: 0 0 35px 35px;
            color: white;
            box-shadow: 0 10px 20px rgba(3, 78, 161, 0.15);
        }

        .content-container { margin-top: -40px; padding: 0 15px; }

        .glass-card {
            background: #ffffff; border-radius: 20px; border: none;
            padding: 20px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.04); margin-bottom: 20px;
        }

        .section-title { color: #2b3674; font-weight: 800; font-size: 1.1rem; margin-bottom: 15px; display: flex; align-items: center; border-bottom: 2px solid #e0e5f2; padding-bottom: 10px;}
        .section-title i { font-size: 1.3rem; margin-right: 8px; }

        .form-label { color: #8f9bba; font-weight: 600; font-size: 0.8rem; margin-left: 5px; margin-bottom: 5px; }
        .form-control, .form-select { border-radius: 12px; padding: 12px; border: 2px solid #e0e5f2; color: #2b3674; font-weight: 600; width: 100%;}
        .form-control:focus, .form-select:focus { border-color: #4caf50; box-shadow: none; background-color: #f8f9ff; }
        
        .btn-scan { background-color: #e8f5e9; color: #4caf50; border: 2px solid #e8f5e9; border-radius: 0 12px 12px 0; padding: 0 15px; transition: all 0.2s; }
        .btn-scan:hover { background-color: #4caf50; color: white; border-color: #4caf50; }

        .btn-submit { background: #4caf50; color: white; border-radius: 12px; padding: 14px; font-weight: 700; border: none; width: 100%; font-size: 1.05rem; transition: all 0.2s; box-shadow: 0 5px 15px rgba(76, 175, 80, 0.3); }
        .btn-submit:hover { background: #388e3c; transform: translateY(-2px); }

        .pedido-card { background: #f8f9ff; border: 1px solid #e0e5f2; border-radius: 15px; padding: 15px; margin-bottom: 15px; position: relative; transition: all 0.2s;}
        .pedido-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
        .pedido-title { font-weight: 800; color: #2b3674; font-size: 1rem; line-height: 1.2; }
        
        .badge-status { padding: 5px 10px; border-radius: 8px; font-weight: 800; font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.5px;}
        .status-pendente { background: #fff3e0; color: #e65100; border: 1px solid #ffe0b2; }
        .status-comprado { background: #e8f5e9; color: #2e7d32; border: 1px solid #c8e6c9; }
        .status-rejeitado { background: #ffebee; color: #c62828; border: 1px solid #ffcdd2; }

        .pedido-meta { font-size: 0.8rem; color: #8f9bba; }
        
        .btn-acao { border-radius: 8px; padding: 8px; font-weight: 700; font-size: 0.85rem; width: 48%; border: none; transition: all 0.2s; }
        .btn-comprar { background: #e8f5e9; color: #2e7d32; border: 1px solid #c8e6c9;}
        .btn-comprar:hover { background: #2e7d32; color: white; }
        .btn-rejeitar { background: #ffebee; color: #c62828; border: 1px solid #ffcdd2; }
        .btn-rejeitar:hover { background: #c62828; color: white; }
        .btn-remover { background: #f5f5f5; color: #9e9e9e; width: 100%; border: 1px solid #e0e0e0;}
        .btn-remover:hover { background: #e0e0e0; color: #d32f2f; }
        
        .btn-modal-confirmar { background: #034EA1; color: white; border-radius: 12px; padding: 12px; font-weight: 700; width: 100%; border: none; transition: all 0.2s; }

        #reader { width: 100%; border-radius: 15px; overflow: hidden; }
        
        .modal-success-icon { font-size: 4rem; color: #4caf50; animation: scaleIn 0.4s ease-out; }
        @keyframes scaleIn { 0% { transform: scale(0); } 80% { transform: scale(1.2); } 100% { transform: scale(1); } }
        
        .obs-box { background: rgba(3, 78, 161, 0.05); border-left: 3px solid #034EA1; padding: 8px 10px; border-radius: 0 8px 8px 0; margin-top: 10px; font-size: 0.8rem; color: #2b3674; }
    </style>
</head>
<body>

    <header class="main-header text-center">
        <div class="container d-flex justify-content-between align-items-center">
            <button class="btn btn-link text-white p-0" onclick="window.location.href='index.html'"><i class="bi bi-chevron-left fs-4"></i></button>
            <h5 class="m-0 fw-bold">Solicitação de Compras</h5>
            <div style="width: 24px;"></div>
        </div>
    </header>

    <div class="container content-container">
        
        <div class="glass-card" style="border-left: 5px solid #4caf50;">
            <div class="section-title text-success"><i class="bi bi-cart-plus-fill"></i> O que está faltando?</div>
            
            <form id="form-compras">
                <div class="mb-3">
                    <label class="form-label">Código GTIN</label>
                    <div class="input-group">
                        <input type="text" class="form-control" id="input-gtin" placeholder="Bipar produto..." required>
                        <button class="btn btn-scan" type="button" onclick="abrirLeitor()"><i class="bi bi-upc-scan"></i></button>
                    </div>
                    <div id="nome-produto" class="small mt-1 text-success fw-bold ms-1"></div>
                </div>

                <div class="mb-4">
                    <label class="form-label">Urgência do Pedido</label>
                    <select class="form-select" id="input-urgencia">
                        <option value="Normal" selected>Estoque Baixo (Normal)</option>
                        <option value="Alta">Ruptura na Gôndola (Alta)</option>
                    </select>
                </div>

                <button type="submit" class="btn-submit" id="btn-solicitar">Solicitar Compra <i class="bi bi-send-fill ms-2"></i></button>
            </form>
        </div>

        <div class="glass-card" style="border-left: 5px solid #034EA1;">
            <div class="d-flex justify-content-between align-items-center mb-3 border-bottom border-2 pb-2" style="border-color: #e0e5f2 !important;">
                <div class="fw-bold text-primary" style="font-size: 1.1rem;"><i class="bi bi-list-task me-2"></i>Status dos Pedidos</div>
                <select class="form-select form-select-sm" id="filtro-status" style="width: 140px; border-radius: 8px;">
                    <option value="Todos">Todos</option>
                    <option value="Pendente" selected>Pendentes</option>
                    <option value="Comprado">Comprados</option>
                    <option value="Rejeitado">Rejeitados</option>
                </select>
            </div>
            
            <div id="lista-pedidos">
                <p class="text-center text-muted small py-4">Carregando pedidos...</p>
            </div>
        </div>

    </div>

    <div class="modal fade" id="modalScanner" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 rounded-4">
                <div class="modal-header bg-dark text-white rounded-top-4">
                    <h6 class="modal-title fw-bold">Escanear GTIN</h6>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" onclick="fecharLeitor()"></button>
                </div>
                <div class="modal-body p-2 bg-dark">
                    <div id="reader"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalAcaoComprador" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-sm">
            <div class="modal-content border-0 rounded-4 p-3 shadow-lg">
                <div class="modal-body p-2">
                    <h5 class="fw-bold text-dark mt-2" id="titulo-modal-acao">Confirmar Ação</h5>
                    <p class="text-muted small mb-3">Deseja deixar alguma observação para a loja?</p>
                    
                    <textarea class="form-control mb-3" id="input-obs-comprador" rows="2" placeholder="Ex: Chega amanhã / Fornecedor sem estoque..."></textarea>
                    
                    <div class="row g-2">
                        <div class="col-5">
                            <button class="btn btn-light btn-modal-confirmar text-muted bg-light" data-bs-dismiss="modal">Voltar</button>
                        </div>
                        <div class="col-7">
                            <button class="btn btn-primary btn-modal-confirmar" id="btn-confirmar-acao">Salvar</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalSucesso" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-sm">
            <div class="modal-content border-0 rounded-4 text-center p-4 shadow-lg">
                <div class="modal-body p-0">
                    <i class="bi bi-check-circle-fill modal-success-icon"></i>
                    <h4 class="fw-bold text-dark mt-3">Enviado!</h4>
                    <p class="text-muted mb-4">Pedido encaminhado ao setor de compras.</p>
                    <button type="button" class="btn btn-submit" style="padding: 10px;" data-bs-dismiss="modal">Ok</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <script src="dados.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, addDoc, updateDoc, deleteDoc, doc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // ==========================================
        // CONEXÃO COM FIREBASE
        // ==========================================
        let db = null;
        try {
            const firebaseConfig = {
                apiKey: "AIzaSyA_i9BkvMFIXxTTtJA6dyFc2HLXKP-TmHU",
                authDomain: "wms-h7.firebaseapp.com",
                projectId: "wms-h7",
                storageBucket: "wms-h7.firebasestorage.app",
                messagingSenderId: "274655939351",
                appId: "1:274655939351:web:533f7b66d3f421596b8552"
            };
            if (firebaseConfig.apiKey !== "SUA_API_KEY") {
                const app = initializeApp(firebaseConfig);
                db = getFirestore(app);
            }
        } catch (error) { console.error("Firebase off."); }

        // Variáveis e Permissões
        const usuarioLogado = localStorage.getItem('usuarioNome') || "Sistema";
        const perfilLogado = (localStorage.getItem('perfilWMS') || "").toLowerCase();
        const isComprador = perfilLogado === 'comprador' || perfilLogado === 'gerente';

        const form = document.getElementById('form-compras');
        const inputGtin = document.getElementById('input-gtin');
        const nomeProduto = document.getElementById('nome-produto');
        const modalSucesso = new bootstrap.Modal(document.getElementById('modalSucesso'));
        const modalScanner = new bootstrap.Modal(document.getElementById('modalScanner'));
        const modalAcaoComprador = new bootstrap.Modal(document.getElementById('modalAcaoComprador'));
        const listaHtml = document.getElementById('lista-pedidos');
        const filtroStatus = document.getElementById('filtro-status');
        
        let pedidosCache = [];
        let html5QrcodeScanner = null;
        let alvoDocId = null;
        let alvoNovoStatus = null;

        // Auto-completar Nome do Produto
        inputGtin.addEventListener('input', (e) => {
            const gtin = e.target.value.trim();
            if (catalogoProdutos[gtin]) {
                nomeProduto.innerText = `✓ ${catalogoProdutos[gtin]}`;
            } else {
                nomeProduto.innerText = '';
            }
        });

        // ==========================================
        // SALVAR NOVO PEDIDO
        // ==========================================
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-solicitar');
            
            const gtin = inputGtin.value.trim();
            const urgencia = document.getElementById('input-urgencia').value;
            const nomeStr = catalogoProdutos[gtin] || "Produto Não Cadastrado (" + gtin + ")";

            if(!db) return alert("Conecte o Firebase para salvar o pedido na nuvem.");

            btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Solicitando...';
            btn.disabled = true;

            try {
                await addDoc(collection(db, "compras_loja"), {
                    gtin,
                    nome: nomeStr,
                    urgencia,
                    solicitante: usuarioLogado,
                    status: "Pendente",
                    observacao_comprador: "", // Campo novo em branco
                    data_solicitacao: new Date().toISOString()
                });

                modalSucesso.show();
                form.reset();
                nomeProduto.innerText = '';
            } catch (error) {
                alert("Erro ao salvar o pedido: " + error.message);
            } finally {
                btn.innerHTML = 'Solicitar Compra <i class="bi bi-send-fill ms-2"></i>';
                btn.disabled = false;
            }
        });

        // ==========================================
        // RENDERIZAR PAINEL E PERMISSÕES
        // ==========================================
        if(db) {
            const q = query(collection(db, "compras_loja"), orderBy("data_solicitacao", "desc"));
            onSnapshot(q, (snapshot) => {
                pedidosCache = [];
                snapshot.forEach(doc => pedidosCache.push({ id: doc.id, ...doc.data() }));
                renderizarPainel();
            });
        } else {
            listaHtml.innerHTML = '<p class="text-center text-danger py-4">Conecte o banco de dados para ver os pedidos.</p>';
        }

        filtroStatus.addEventListener('change', renderizarPainel);

        function renderizarPainel() {
            const filtro = filtroStatus.value;
            
            let pedidosVisiveis = pedidosCache;
            if(!isComprador) {
                pedidosVisiveis = pedidosVisiveis.filter(p => p.solicitante === usuarioLogado);
            }

            if(filtro !== "Todos") {
                pedidosVisiveis = pedidosVisiveis.filter(p => p.status === filtro);
            }

            if(pedidosVisiveis.length === 0) {
                listaHtml.innerHTML = `<p class="text-center text-muted small py-4">Nenhum pedido listado.</p>`;
                return;
            }

            listaHtml.innerHTML = pedidosVisiveis.map(p => {
                let badgeClass = 'status-pendente';
                if(p.status === 'Comprado') badgeClass = 'status-comprado';
                else if(p.status === 'Rejeitado') badgeClass = 'status-rejeitado';

                const iconeUrgencia = p.urgencia === 'Alta' ? '<i class="bi bi-fire text-danger" title="Urgência Alta"></i>' : '';
                const dataFormatada = new Date(p.data_solicitacao).toLocaleDateString('pt-BR');
                const horaFormatada = new Date(p.data_solicitacao).toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit'});

                // Exibir a observação do comprador se existir
                const htmlObs = (p.observacao_comprador && p.observacao_comprador.trim() !== '') 
                    ? `<div class="obs-box"><strong>Retorno:</strong> ${p.observacao_comprador}</div>` 
                    : '';

                let areaBotoes = '';
                
                if (isComprador && p.status === 'Pendente') {
                    areaBotoes = `
                    <div class="d-flex justify-content-between mt-3">
                        <button class="btn-acao btn-rejeitar" onclick="prepararAcaoComprador('${p.id}', 'Rejeitado')"><i class="bi bi-x-circle-fill"></i> Rejeitar</button>
                        <button class="btn-acao btn-comprar" onclick="prepararAcaoComprador('${p.id}', 'Comprado')"><i class="bi bi-check-circle-fill"></i> Comprado</button>
                    </div>`;
                } 
                else if (!isComprador && p.status === 'Pendente') {
                    areaBotoes = `
                    <div class="mt-3">
                        <button class="btn-acao btn-remover" onclick="excluirPedido('${p.id}')"><i class="bi bi-trash3-fill"></i> Cancelar Solicitação</button>
                    </div>`;
                }
                else if (isComprador && p.status !== 'Pendente') {
                    areaBotoes = `
                    <div class="mt-3">
                        <button class="btn-acao btn-remover" onclick="excluirPedido('${p.id}')"><i class="bi bi-trash3-fill"></i> Limpar do Histórico</button>
                    </div>`;
                }

                return `
                <div class="pedido-card shadow-sm border-start border-${p.status === 'Pendente' ? 'warning' : (p.status === 'Comprado' ? 'success' : 'danger')} border-4">
                    <div class="pedido-header">
                        <div class="pedido-title">${iconeUrgencia} ${p.nome}</div>
                        <div class="badge-status ${badgeClass}">${p.status}</div>
                    </div>
                    <div class="pedido-meta mt-1">
                        <div><i class="bi bi-upc"></i> GTIN: ${p.gtin}</div>
                        <div class="mt-1"><i class="bi bi-person-fill"></i> De: <strong>${p.solicitante}</strong> | <i class="bi bi-clock"></i> ${dataFormatada} às ${horaFormatada}</div>
                    </div>
                    ${htmlObs}
                    ${areaBotoes}
                </div>
                `;
            }).join('');
        }

        // ==========================================
        // FLUXO DE AÇÃO DO COMPRADOR COM OBSERVAÇÃO
        // ==========================================
        window.prepararAcaoComprador = (docId, novoStatus) => {
            alvoDocId = docId;
            alvoNovoStatus = novoStatus;
            
            document.getElementById('input-obs-comprador').value = '';
            
            const titulo = document.getElementById('titulo-modal-acao');
            if(novoStatus === 'Comprado') {
                titulo.innerHTML = '<i class="bi bi-check-circle-fill text-success"></i> Confirmar Compra';
            } else {
                titulo.innerHTML = '<i class="bi bi-x-circle-fill text-danger"></i> Rejeitar Pedido';
            }
            
            modalAcaoComprador.show();
        }

        document.getElementById('btn-confirmar-acao').addEventListener('click', async () => {
            const obs = document.getElementById('input-obs-comprador').value.trim();
            const btn = document.getElementById('btn-confirmar-acao');
            
            btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Salvando...';
            btn.disabled = true;

            try {
                await updateDoc(doc(db, "compras_loja", alvoDocId), { 
                    status: alvoNovoStatus,
                    observacao_comprador: obs
                });
                modalAcaoComprador.hide();
            } catch(e) { 
                alert("Erro ao atualizar o status: " + e.message); 
            } finally {
                btn.innerHTML = 'Salvar';
                btn.disabled = false;
            }
        });

        // ==========================================
        // APAGAR PEDIDO
        // ==========================================
        window.excluirPedido = async (docId) => {
            if(!confirm("Deseja realmente apagar esta solicitação?")) return;
            try {
                await deleteDoc(doc(db, "compras_loja", docId));
            } catch(e) {
                alert("Erro ao apagar: " + e.message);
            }
        }

        // ==========================================
        // CÂMERA
        // ==========================================
        window.abrirLeitor = () => {
            modalScanner.show();
            html5QrcodeScanner = new Html5Qrcode("reader");
            html5QrcodeScanner.start({ facingMode: "environment" }, { fps: 10, qrbox: { width: 250, height: 250 } }, onScanSuccess)
            .catch(err => alert("Erro na câmera."));
        };

        function onScanSuccess(decodedText) {
            fecharLeitor();
            inputGtin.value = decodedText;
            inputGtin.dispatchEvent(new Event('input'));
            try { navigator.vibrate(100); } catch(e){}
        }

        window.fecharLeitor = () => {
            if (html5QrcodeScanner) {
                html5QrcodeScanner.stop().then(() => html5QrcodeScanner.clear());
            }
            modalScanner.hide();
        };

        document.getElementById('modalScanner').addEventListener('hidden.bs.modal', function () {
            if (html5QrcodeScanner) window.fecharLeitor();
        });

    </script>
</body>
</html>
