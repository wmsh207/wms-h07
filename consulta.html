<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consulta H-07 | WMS</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        
        body { background-color: #f4f7fe; font-family: 'Inter', sans-serif; padding-bottom: 70px; }

        /* Cabeçalho Premium H-07 */
        .main-header {
            background: linear-gradient(135deg, #034EA1 0%, #007bff 100%);
            padding: 30px 20px 60px;
            border-radius: 0 0 35px 35px;
            color: white;
            box-shadow: 0 10px 20px rgba(3, 78, 161, 0.15);
        }

        .content-container { margin-top: -40px; padding: 0 15px; }

        /* Card Moderno */
        .glass-card {
            background: #ffffff;
            border-radius: 20px;
            border: none;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.04);
            margin-bottom: 20px;
        }

        .section-title { color: #2b3674; font-weight: 700; font-size: 1rem; margin-bottom: 15px; display: flex; align-items: center; }
        .section-title i { font-size: 1.3rem; margin-right: 8px; }

        .form-label { color: #8f9bba; font-weight: 600; font-size: 0.8rem; margin-left: 5px; margin-bottom: 5px; }
        
        .input-group-text { background: transparent; border: 2px solid #e0e5f2; border-right: none; color: #0288d1; }
        .form-control { border-radius: 12px; padding: 12px; border: 2px solid #e0e5f2; color: #2b3674; font-weight: 600; }
        .form-control:focus { border-color: #0288d1; box-shadow: none; background-color: #f8f9ff; }
        
        /* Botão da Câmera */
        .btn-scan { background-color: #e1f5fe; color: #0288d1; border: 2px solid #e1f5fe; border-radius: 0 12px 12px 0; padding: 0 15px; transition: all 0.2s; }
        .btn-scan:hover { background-color: #0288d1; color: white; border-color: #0288d1; }

        /* Botão de Pesquisa */
        .btn-submit { background: #0288d1; color: white; border-radius: 12px; padding: 15px; font-weight: 700; border: none; width: 100%; font-size: 1.1rem; transition: all 0.2s; box-shadow: 0 5px 15px rgba(2, 136, 209, 0.3); }
        .btn-submit:hover { background: #0277bd; transform: translateY(-2px); }

        /* Estilo dos Resultados */
        .result-item { background: #f8f9ff; border: 1px solid #e0e5f2; border-radius: 15px; padding: 15px; margin-bottom: 12px; position: relative; overflow: hidden; }
        .result-item::before { content: ''; position: absolute; left: 0; top: 0; height: 100%; width: 5px; background-color: #0288d1; }
        .result-vaga { font-size: 1.2rem; font-weight: 800; color: #034EA1; }
        .result-info { font-size: 0.85rem; color: #8f9bba; margin-top: 5px; }
        
        /* Leitor Modal */
        #reader { width: 100%; border-radius: 15px; overflow: hidden; }
        
        .badge-vencimento { font-size: 0.75rem; padding: 5px 8px; border-radius: 8px; }
    </style>
</head>
<body>

    <header class="main-header text-center">
        <div class="container d-flex justify-content-between align-items-center">
            <button class="btn btn-link text-white p-0" onclick="window.location.href='index.html'"><i class="bi bi-chevron-left fs-4"></i></button>
            <h5 class="m-0 fw-bold">Consulta de Estoque</h5>
            <div style="width: 24px;"></div>
        </div>
    </header>

    <div class="container content-container">
        
        <div class="glass-card" style="border-left: 5px solid #0288d1;">
            <div class="section-title text-info"><i class="bi bi-search"></i> Localizar Produto ou Vaga</div>
            
            <div class="mb-3">
                <label class="form-label">Nome, GTIN ou Vaga (Ex: A-1-0-1)</label>
                <div class="input-group">
                    <input type="text" class="form-control text-uppercase" id="input-busca" placeholder="Digite para buscar..." autofocus>
                    <button class="btn btn-scan" type="button" onclick="abrirLeitor()"><i class="bi bi-upc-scan"></i></button>
                </div>
            </div>

            <button type="button" class="btn-submit" id="btn-pesquisar">Procurar <i class="bi bi-arrow-right-circle-fill ms-2"></i></button>
        </div>

        <div class="glass-card d-none" id="card-resultados" style="border-left: 5px solid #4caf50;">
            <div class="section-title text-success"><i class="bi bi-list-check"></i> Resultados Encontrados</div>
            
            <div id="lista-resultados">
                </div>
        </div>

    </div>

    <div class="modal fade" id="modalScanner" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 rounded-4">
                <div class="modal-header bg-dark text-white rounded-top-4">
                    <h6 class="modal-title fw-bold">Escanear GTIN ou QR Code</h6>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close" onclick="fecharLeitor()"></button>
                </div>
                <div class="modal-body p-2 bg-dark">
                    <div id="reader"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <script src="dados.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // COLOQUE SUAS CHAVES DO FIREBASE AQUI
        const firebaseConfig = {
            apiKey: "AIzaSyA_i9BkvMFIXxTTtJA6dyFc2HLXKP-TmHU",
            authDomain: "wms-h7.firebaseapp.com",
            projectId: "wms-h7",
            storageBucket: "wms-h7.firebasestorage.app",
            messagingSenderId: "274655939351",
            appId: "1:274655939351:web:533f7b66d3f421596b8552"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let html5QrcodeScanner = null;
        const inputBusca = document.getElementById('input-busca');
        const cardResultados = document.getElementById('card-resultados');
        const listaResultados = document.getElementById('lista-resultados');
        const modalScanner = new bootstrap.Modal(document.getElementById('modalScanner'));

        // Permitir pesquisar apertando a tecla "Enter"
        inputBusca.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') realizarBusca();
        });

        document.getElementById('btn-pesquisar').addEventListener('click', realizarBusca);

        async function realizarBusca() {
            const termo = inputBusca.value.trim().toUpperCase();
            if (!termo) return alert("Por favor, digite algo para buscar.");

            const btnPesquisar = document.getElementById('btn-pesquisar');
            btnPesquisar.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Buscando...';
            btnPesquisar.disabled = true;

            try {
                const snapshot = await getDocs(collection(db, "inventario_ativo"));
                let encontrados = [];

                snapshot.forEach(doc => {
                    const data = doc.data();
                    if (data.status === "ocupada") {
                        const nomeProduto = (catalogoProdutos[data.gtin] || "").toUpperCase();
                        
                        // Busca bate com Vaga, GTIN ou trecho do Nome do Produto
                        if (data.vaga_id.includes(termo) || data.gtin === termo || nomeProduto.includes(termo)) {
                            encontrados.push(data);
                        }
                    }
                });

                exibirResultados(encontrados);

            } catch (error) {
                console.error("Erro na busca:", error);
                alert("Erro ao conectar com o banco de dados.");
            } finally {
                btnPesquisar.innerHTML = 'Procurar <i class="bi bi-arrow-right-circle-fill ms-2"></i>';
                btnPesquisar.disabled = false;
            }
        }

        function exibirResultados(dados) {
            listaResultados.innerHTML = '';
            cardResultados.classList.remove('d-none');

            if (dados.length === 0) {
                listaResultados.innerHTML = `
                    <div class="text-center p-4">
                        <i class="bi bi-search text-muted" style="font-size: 2rem;"></i>
                        <p class="mt-2 text-muted fw-bold">Nenhum pallet encontrado.</p>
                        <small class="text-muted">Verifique o código ou nome digitado.</small>
                    </div>`;
                return;
            }

            const dataHoje = new Date();
            const dataAlerta = new Date();
            dataAlerta.setDate(dataHoje.getDate() + 30);

            dados.forEach(item => {
                const nomeProd = catalogoProdutos[item.gtin] || "Produto Não Cadastrado";
                const dVenc = item.validade ? new Date(item.validade + 'T12:00:00') : null;
                
                let badgeValidade = '<span class="badge bg-secondary badge-vencimento">Validade: N/I</span>';
                
                if (dVenc) {
                    const dataFormatada = dVenc.toLocaleDateString('pt-BR');
                    if (dVenc <= dataHoje) {
                        badgeValidade = `<span class="badge bg-dark badge-vencimento"><i class="bi bi-x-circle-fill"></i> Vencido: ${dataFormatada}</span>`;
                    } else if (dVenc <= dataAlerta) {
                        badgeValidade = `<span class="badge bg-danger badge-vencimento"><i class="bi bi-exclamation-triangle-fill"></i> Vence: ${dataFormatada}</span>`;
                    } else {
                        badgeValidade = `<span class="badge bg-success badge-vencimento"><i class="bi bi-check-circle-fill"></i> Vence: ${dataFormatada}</span>`;
                    }
                }

                listaResultados.innerHTML += `
                    <div class="result-item shadow-sm">
                        <div class="d-flex justify-content-between align-items-start mb-2">
                            <div class="result-vaga"><i class="bi bi-geo-alt"></i> ${item.vaga_id}</div>
                            ${badgeValidade}
                        </div>
                        <div class="fw-bold text-dark" style="font-size: 0.95rem;">${nomeProd}</div>
                        <div class="result-info">
                            <i class="bi bi-upc"></i> GTIN: ${item.gtin}
                        </div>
                    </div>
                `;
            });
        }

        // ======= CÂMERA (LEITOR DE CÓDIGO) =======
        window.abrirLeitor = () => {
            modalScanner.show();
            html5QrcodeScanner = new Html5Qrcode("reader");
            const config = { fps: 10, qrbox: { width: 250, height: 250 } };
            
            html5QrcodeScanner.start({ facingMode: "environment" }, config, onScanSuccess)
            .catch(err => {
                alert("Erro ao acessar a câmera. Verifique as permissões do navegador.");
            });
        };

        function onScanSuccess(decodedText) {
            fecharLeitor();
            inputBusca.value = decodedText;
            try { navigator.vibrate(100); } catch(e){} // Vibração suave
            realizarBusca(); // Dispara a pesquisa automaticamente após ler
        }

        window.fecharLeitor = () => {
            if (html5QrcodeScanner) {
                html5QrcodeScanner.stop().then(() => {
                    html5QrcodeScanner.clear();
                }).catch(err => console.log(err));
            }
            modalScanner.hide();
        };

        document.getElementById('modalScanner').addEventListener('hidden.bs.modal', function () {
            if (html5QrcodeScanner) window.fecharLeitor();
        });
    </script>
</body>
</html>
