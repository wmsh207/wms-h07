<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consulta Real-Time | WMS H-07</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <script type="module">
    // Puxa a conexão do nosso arquivo central!
    import { db } from './config.js';
    import { collection, query, where, onSnapshot, doc, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    let estoqueLocal = [];

    const q = query(collection(db, "inventario"), where("status_item", "==", "No Pallet"));
    
    onSnapshot(q, (snapshot) => {
        estoqueLocal = [];
        snapshot.forEach((doc) => {
            estoqueLocal.push({ id: doc.id, ...doc.data() });
        });
        renderizarLista(estoqueLocal);
        document.getElementById('statusSinc').innerHTML = `<i class="bi bi-check-all text-success"></i> Sincronizado (${estoqueLocal.length})`;
    });

    window.darBaixa = async (idDocumento) => {
        if(confirm("Deseja remover este produto da vaga?")) {
            const docRef = doc(db, "inventario", idDocumento);
            await updateDoc(docRef, { status_item: "Removido", data_saida: serverTimestamp() });
        }
    };

    window.filtrar = () => {
        const termo = document.getElementById('inputBusca').value.toLowerCase();
        const filtrados = estoqueLocal.filter(item => 
            item.nome.toLowerCase().includes(termo) || item.gtin.includes(termo)
        );
        renderizarLista(filtrados);
    };
</script>

    <style>
        body { background-color: #f0f2f5; }
        .app-header { background-color: #198754; color: white; padding: 15px 0; }
        .search-container { position: sticky; top: 0; z-index: 100; background: #f0f2f5; padding-top: 10px; }
        .item-card { border-radius: 12px; border: none; border-left: 6px solid #198754; transition: 0.3s; }
        .vaga-badge { background-color: #e8f5e9; color: #1b5e20; font-weight: bold; padding: 8px 12px; border-radius: 8px; }
    </style>
</head>
<body>

    <header class="app-header mb-3 shadow-sm text-center">
        <div class="container d-flex justify-content-between align-items-center">
            <a href="index.html" class="text-white"><i class="bi bi-arrow-left fs-3"></i></a>
            <h4 class="m-0">Consulta H-07</h4>
            <div id="statusSinc" class="small">Conectando...</div>
        </div>
    </header>

    <div class="container">
        <div class="search-container mb-4">
            <div class="input-group input-group-lg shadow-sm">
                <span class="input-group-text bg-white border-0"><i class="bi bi-search"></i></span>
                <input type="text" class="form-control border-0" id="inputBusca" placeholder="Nome ou GTIN..." onkeyup="window.filtrar()">
            </div>
        </div>

        <div id="listaEstoque" class="row g-3">
            </div>
    </div>

    <script>
        function renderizarLista(lista) {
            const container = document.getElementById('listaEstoque');
            container.innerHTML = "";

            if (lista.length === 0) {
                container.innerHTML = `<div class="text-center mt-5 text-muted">Nenhum produto nas vagas.</div>`;
                return;
            }

            lista.forEach(item => {
                container.innerHTML += `
                    <div class="col-12">
                        <div class="card item-card shadow-sm">
                            <div class="card-body d-flex justify-content-between align-items-center">
                                <div>
                                    <h6 class="mb-1 text-uppercase fw-bold">${item.nome}</h6>
                                    <small class="text-muted d-block">GTIN: ${item.gtin}</small>
                                </div>
                                <div class="text-end">
                                    <div class="vaga-badge mb-2"><i class="bi bi-geo-alt"></i> ${item.vaga}</div>
                                    <button class="btn btn-sm btn-outline-danger border-0" onclick="window.darBaixa('${item.id}')">
                                        <i class="bi bi-trash"></i> Baixa
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            });
        }
    </script>
</body>
</html>
