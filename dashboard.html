<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | WMS H-07</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        
        body { background-color: #f4f7fe; font-family: 'Inter', sans-serif; padding-bottom: 70px; }

        .main-header {
            background: linear-gradient(135deg, #034EA1 0%, #007bff 100%);
            padding: 30px 20px 60px;
            border-radius: 0 0 35px 35px;
            color: white;
            box-shadow: 0 10px 20px rgba(3, 78, 161, 0.15);
        }

        .content-container { margin-top: -40px; padding: 0 15px; }

        .glass-card {
            background: #ffffff; border-radius: 20px; border: none;
            padding: 20px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.04); margin-bottom: 20px;
        }

        .section-title { color: #2b3674; font-weight: 800; font-size: 1.1rem; margin-bottom: 15px; display: flex; align-items: center; border-bottom: 2px solid #e0e5f2; padding-bottom: 10px;}
        
        /* KPIs */
        .kpi-card {
            background: #ffffff; border-radius: 20px; padding: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.04); height: 100%;
            display: flex; align-items: center; transition: transform 0.2s;
        }
        .kpi-card:hover { transform: translateY(-5px); box-shadow: 0 15px 35px rgba(0, 0, 0, 0.08); }
        .kpi-icon { width: 55px; height: 55px; border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; margin-right: 15px; flex-shrink: 0; }
        .kpi-info { flex-grow: 1; }
        .kpi-title { font-size: 0.75rem; color: #8f9bba; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 2px;}
        .kpi-value { font-size: 1.5rem; font-weight: 800; color: #2b3674; line-height: 1; }

        .kpi-blue { background: #e0eaff; color: #4318FF; }
        .kpi-green { background: #e8f5e9; color: #4caf50; }
        .kpi-orange { background: #fff3e0; color: #ff9800; }
        .kpi-red { background: #ffebee; color: #f44336; }

        .chart-container { position: relative; height: 250px; width: 100%; }

        /* Tabela de Vencimentos */
        .table-custom { margin-bottom: 0; }
        .table-custom thead th { color: #8f9bba; font-weight: 700; font-size: 0.8rem; text-transform: uppercase; border-bottom: 2px solid #e0e5f2; padding-bottom: 10px; }
        .table-custom tbody tr { border-bottom: 1px solid #f4f7fe; transition: background 0.2s; }
        .table-custom tbody tr:hover { background-color: #f8f9ff; }
        .table-custom td { padding: 12px 8px; vertical-align: middle; color: #2b3674; font-weight: 500; font-size: 0.9rem; }
        .td-vaga { font-weight: 800; color: #034EA1; }
        
        .badge-date { font-weight: 800; padding: 6px 12px; border-radius: 8px; font-size: 0.75rem;}
        .date-danger { background: #ffebee; color: #c62828; }
        .date-warning { background: #fff3e0; color: #e65100; }

        #loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(244, 247, 254, 0.9); z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
    </style>
</head>
<body>

    <div id="loading-overlay">
        <div class="spinner-border text-primary" style="width: 3rem; height: 3rem;" role="status"></div>
        <h5 class="mt-3 fw-bold text-primary">Calculando Indicadores...</h5>
    </div>

    <header class="main-header text-center">
        <div class="container d-flex justify-content-between align-items-center">
            <button class="btn btn-link text-white p-0" onclick="window.location.href='index.html'"><i class="bi bi-chevron-left fs-4"></i></button>
            <h5 class="m-0 fw-bold">Dashboard Gerencial</h5>
            <div style="width: 24px;"></div>
        </div>
    </header>

    <div class="container content-container">
        
        <div class="row g-3 mb-4">
            <div class="col-6 col-md-3">
                <div class="kpi-card">
                    <div class="kpi-icon kpi-blue"><i class="bi bi-geo-alt-fill"></i></div>
                    <div class="kpi-info">
                        <div class="kpi-title">Vagas em Uso</div>
                        <div class="kpi-value" id="kpi-vagas">0</div>
                    </div>
                </div>
            </div>
            
            <div class="col-6 col-md-3">
                <div class="kpi-card">
                    <div class="kpi-icon kpi-green"><i class="bi bi-pie-chart-fill"></i></div>
                    <div class="kpi-info">
                        <div class="kpi-title">Ocupação</div>
                        <div class="kpi-value" id="kpi-ocupacao">0%</div>
                    </div>
                </div>
            </div>

            <div class="col-6 col-md-3">
                <div class="kpi-card">
                    <div class="kpi-icon kpi-orange"><i class="bi bi-cart-fill"></i></div>
                    <div class="kpi-info">
                        <div class="kpi-title">Compras (Pend.)</div>
                        <div class="kpi-value" id="kpi-compras">0</div>
                    </div>
                </div>
            </div>

            <div class="col-6 col-md-3">
                <div class="kpi-card">
                    <div class="kpi-icon kpi-red"><i class="bi bi-exclamation-triangle-fill"></i></div>
                    <div class="kpi-info">
                        <div class="kpi-title">Vencendo</div>
                        <div class="kpi-value" id="kpi-vencimento">0</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="row g-3 mb-4">
            <div class="col-12 col-md-6">
                <div class="glass-card h-100 border-top border-4 border-primary">
                    <div class="section-title"><i class="bi bi-pie-chart-fill text-primary"></i> Lotação do Depósito</div>
                    <div class="chart-container"><canvas id="graficoOcupacao"></canvas></div>
                </div>
            </div>

            <div class="col-12 col-md-6">
                <div class="glass-card h-100 border-top border-4 border-warning">
                    <div class="section-title"><i class="bi bi-bar-chart-fill text-warning"></i> Funil de Compras da Loja</div>
                    <div class="chart-container"><canvas id="graficoCompras"></canvas></div>
                </div>
            </div>
        </div>

        <div class="row g-3">
            <div class="col-12">
                <div class="glass-card border-top border-4 border-danger">
                    <div class="section-title text-danger mb-3"><i class="bi bi-shield-exclamation"></i> Produtos Próximos do Vencimento (30 Dias)</div>
                    <div class="table-responsive">
                        <table class="table table-custom table-borderless align-middle">
                            <thead>
                                <tr>
                                    <th>Endereço (Vaga)</th>
                                    <th>Produto</th>
                                    <th>GTIN</th>
                                    <th>Vencimento</th>
                                </tr>
                            </thead>
                            <tbody id="lista-vencimentos">
                                </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="dados.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // PERMISSÃO
        const perfilLogado = (localStorage.getItem('perfilWMS') || "").toLowerCase();
        if (perfilLogado !== 'gerente') {
            alert("Acesso Negado. Área restrita à gerência.");
            window.location.href = 'index.html';
        }

        // FIREBASE
        let db = null;
        try {
            const firebaseConfig = {
                apiKey: "AIzaSyA_i9BkvMFIXxTTtJA6dyFc2HLXKP-TmHU",
                authDomain: "wms-h7.firebaseapp.com",
                projectId: "wms-h7",
                storageBucket: "wms-h7.firebasestorage.app",
                messagingSenderId: "274655939351",
                appId: "1:274655939351:web:533f7b66d3f421596b8552"
            };
            if (firebaseConfig.apiKey !== "SUA_API_KEY") {
                const app = initializeApp(firebaseConfig);
                db = getFirestore(app);
            }
        } catch (error) { console.error("Firebase off."); }

        let chartOcupacao = null;
        let chartCompras = null;

        async function carregarDashboard() {
            if(!db) return alert("Firebase não conectado!");

            try {
                // A. Puxar Capacidade Total (dados.js)
                let totalVagas = 0;
                for (let corredor in estruturaDeposito) {
                    totalVagas += estruturaDeposito[corredor].length;
                }

                // B. Puxar Inventário
                const snapInv = await getDocs(collection(db, "inventario_ativo"));
                
                let vagasOcupadasSet = new Set(); // Usando Set para contar vagas únicas
                let itensVencendo = [];
                
                const dataHoje = new Date();
                dataHoje.setHours(0,0,0,0); // Zera hora para comparar apenas a data
                
                const dataLimite = new Date();
                dataLimite.setDate(dataHoje.getDate() + 30);

                snapInv.forEach(doc => {
                    const data = doc.data();
                    if(data.status === "ocupada") {
                        vagasOcupadasSet.add(data.vaga_id); // Adiciona a vaga (se já existir, o Set não duplica)

                        if(data.validade) {
                            const dVenc = new Date(data.validade + 'T12:00:00');
                            if(dVenc <= dataLimite) {
                                itensVencendo.push({
                                    vaga: data.vaga_id,
                                    gtin: data.gtin,
                                    nome: catalogoProdutos[data.gtin] || 'Produto não cadastrado',
                                    vencimento: dVenc
                                });
                            }
                        }
                    }
                });

                const vagasOcupadas = vagasOcupadasSet.size;

                // C. Puxar Compras
                const snapComp = await getDocs(collection(db, "compras_loja"));
                let compPendentes = 0, compComprados = 0, compRejeitados = 0;

                snapComp.forEach(doc => {
                    const st = doc.data().status;
                    if(st === 'Pendente') compPendentes++;
                    else if(st === 'Comprado') compComprados++;
                    else if(st === 'Rejeitado') compRejeitados++;
                });

                // ATUALIZAR KPIs
                const taxaOcupacao = totalVagas > 0 ? Math.round((vagasOcupadas / totalVagas) * 100) : 0;
                
                animarNumero('kpi-vagas', vagasOcupadas);
                animarNumero('kpi-ocupacao', taxaOcupacao, '%');
                animarNumero('kpi-compras', compPendentes); 
                animarNumero('kpi-vencimento', itensVencendo.length);

                // GRÁFICOS
                renderizarGraficos(totalVagas, vagasOcupadas, compPendentes, compComprados, compRejeitados);

                // TABELA DE VENCIMENTOS
                renderizarTabelaVencimentos(itensVencendo, dataHoje);

            } catch(e) {
                console.error("Erro no Dashboard:", e);
                alert("Falha ao carregar dados.");
            } finally {
                const loader = document.getElementById('loading-overlay');
                loader.style.opacity = '0';
                setTimeout(() => loader.style.display = 'none', 500);
            }
        }

        function renderizarTabelaVencimentos(itens, dataHoje) {
            const tbody = document.getElementById('lista-vencimentos');
            
            if (itens.length === 0) {
                tbody.innerHTML = `<tr><td colspan="4" class="text-center text-muted py-4"><i class="bi bi-check-circle-fill text-success fs-4 d-block mb-2"></i>Nenhum produto vencendo nos próximos 30 dias.</td></tr>`;
                return;
            }

            // Ordena do mais crítico (mais antigo) para o mais distante
            itens.sort((a, b) => a.vencimento - b.vencimento);

            tbody.innerHTML = itens.map(item => {
                const dataFormatada = item.vencimento.toLocaleDateString('pt-BR');
                
                // Define a cor do Badge (Vermelho para já vencido ou vence em < 5 dias, Laranja para os demais)
                const diasParaVencer = Math.ceil((item.vencimento - dataHoje) / (1000 * 60 * 60 * 24));
                let badgeClass = 'date-warning';
                let icone = '<i class="bi bi-exclamation-triangle-fill me-1"></i>';

                if (diasParaVencer < 0) {
                    badgeClass = 'date-danger';
                    icone = '<i class="bi bi-x-circle-fill me-1"></i> Vencido: ';
                } else if (diasParaVencer <= 5) {
                    badgeClass = 'date-danger';
                }

                return `
                <tr>
                    <td class="td-vaga"><i class="bi bi-geo-alt"></i> ${item.vaga}</td>
                    <td><div class="text-truncate" style="max-width: 250px;" title="${item.nome}">${item.nome}</div></td>
                    <td class="text-muted"><i class="bi bi-upc"></i> ${item.gtin}</td>
                    <td><span class="badge-date ${badgeClass}">${icone}${dataFormatada}</span></td>
                </tr>
                `;
            }).join('');
        }

        function animarNumero(id, target, sufixo = '') {
            const el = document.getElementById(id);
            let current = 0;
            const inc = target / 20; 
            if(target === 0) return el.innerText = "0" + sufixo;
            
            const timer = setInterval(() => {
                current += inc;
                if(current >= target) {
                    el.innerText = target + sufixo;
                    clearInterval(timer);
                } else {
                    el.innerText = Math.floor(current) + sufixo;
                }
            }, 30);
        }

        function renderizarGraficos(totalVagas, ocupados, pendentes, comprados, rejeitados) {
            const vagasLivres = totalVagas - ocupados;

            Chart.defaults.font.family = "'Inter', sans-serif";
            Chart.defaults.color = "#8f9bba";

            const ctxOcupacao = document.getElementById('graficoOcupacao').getContext('2d');
            chartOcupacao = new Chart(ctxOcupacao, {
                type: 'doughnut',
                data: {
                    labels: ['Vagas Ocupadas', 'Vagas Livres'],
                    datasets: [{
                        data: [ocupados, vagasLivres],
                        backgroundColor: ['#4318FF', '#e0eaff'],
                        borderWidth: 0, hoverOffset: 10
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false, cutout: '75%',
                    plugins: { legend: { position: 'bottom', labels: { usePointStyle: true, padding: 20 } } }
                }
            });

            const ctxCompras = document.getElementById('graficoCompras').getContext('2d');
            chartCompras = new Chart(ctxCompras, {
                type: 'bar',
                data: {
                    labels: ['Pendentes', 'Comprados', 'Rejeitados'],
                    datasets: [{
                        label: 'Pedidos',
                        data: [pendentes, comprados, rejeitados],
                        backgroundColor: ['#ff9800', '#4caf50', '#f44336'],
                        borderRadius: 8, barThickness: 40
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { beginAtZero: true, grid: { color: '#e0e5f2', drawBorder: false } },
                        x: { grid: { display: false, drawBorder: false } }
                    }
                }
            });
        }

        carregarDashboard();
    </script>
</body>
</html>
