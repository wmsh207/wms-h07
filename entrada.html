<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrada H-07 | WMS</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        
        body { background-color: #f4f7fe; font-family: 'Inter', sans-serif; padding-bottom: 70px; }

        .main-header {
            background: linear-gradient(135deg, #034EA1 0%, #007bff 100%);
            padding: 30px 20px 60px;
            border-radius: 0 0 35px 35px;
            color: white;
            box-shadow: 0 10px 20px rgba(3, 78, 161, 0.15);
        }

        .content-container { margin-top: -40px; padding: 0 15px; }

        .glass-card {
            background: #ffffff;
            border-radius: 20px;
            border: none;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.04);
            margin-bottom: 20px;
        }

        .section-title { color: #2b3674; font-weight: 700; font-size: 1rem; margin-bottom: 15px; display: flex; align-items: center; }
        .section-title i { font-size: 1.3rem; margin-right: 8px; }

        .form-label { color: #8f9bba; font-weight: 600; font-size: 0.8rem; margin-left: 5px; margin-bottom: 5px; }
        
        .input-group-text { background: transparent; border: 2px solid #e0e5f2; border-right: none; color: #4318FF; }
        .form-control { border-radius: 12px; padding: 12px; border: 2px solid #e0e5f2; color: #2b3674; font-weight: 600; }
        .form-control:focus { border-color: #4318FF; box-shadow: none; background-color: #f8f9ff; }
        
        .btn-scan { background-color: #e0eaff; color: #4318FF; border: 2px solid #e0eaff; border-radius: 0 12px 12px 0; padding: 0 15px; transition: all 0.2s; }
        .btn-scan:hover { background-color: #4318FF; color: white; border-color: #4318FF; }

        .btn-add { background: #e8f5e9; color: #4caf50; border-radius: 12px; padding: 12px; font-weight: 700; border: none; width: 100%; transition: all 0.2s; }
        .btn-add:hover { background: #4caf50; color: white; }

        .btn-submit { background: #4318FF; color: white; border-radius: 12px; padding: 15px; font-weight: 700; border: none; width: 100%; font-size: 1.1rem; transition: all 0.2s; box-shadow: 0 5px 15px rgba(67, 24, 255, 0.3); }
        .btn-submit:hover { background: #3311cc; transform: translateY(-2px); }

        .temp-item { background: #f8f9ff; border: 1px dashed #c0c7d6; border-radius: 12px; padding: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .temp-item-info { font-size: 0.85rem; color: #2b3674; }
        .temp-item-info strong { font-size: 0.95rem; }
        .btn-remove-item { background: none; border: none; color: #dc3545; font-size: 1.2rem; }

        #reader { width: 100%; border-radius: 15px; overflow: hidden; }
        
        /* Modal Moderno de Sucesso */
        .modal-success-icon { font-size: 4rem; color: #4caf50; animation: scaleIn 0.4s ease-out; }
        @keyframes scaleIn { 0% { transform: scale(0); } 80% { transform: scale(1.2); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

    <header class="main-header text-center">
        <div class="container d-flex justify-content-between align-items-center">
            <button class="btn btn-link text-white p-0" onclick="window.location.href='index.html'"><i class="bi bi-chevron-left fs-4"></i></button>
            <h5 class="m-0 fw-bold">Alocação Múltipla</h5>
            <div style="width: 24px;"></div>
        </div>
    </header>

    <div class="container content-container">
        
        <div class="glass-card" style="border-left: 5px solid #ff9800;">
            <div class="section-title text-warning"><i class="bi bi-geo-alt-fill"></i> 1. Destino (Vaga)</div>
            <div class="input-group">
                <input type="text" class="form-control text-uppercase" id="input-vaga" placeholder="Ex: A-1-0-1" required>
                <button class="btn btn-scan" type="button" onclick="abrirLeitor('vaga')"><i class="bi bi-qr-code-scan"></i></button>
            </div>
        </div>

        <div class="glass-card" style="border-left: 5px solid #4318FF;">
            <div class="section-title text-primary"><i class="bi bi-box-seam-fill"></i> 2. Bipar Produtos</div>
            
            <div class="mb-3">
                <label class="form-label">Código GTIN</label>
                <div class="input-group">
                    <input type="text" class="form-control" id="input-gtin" placeholder="789...">
                    <button class="btn btn-scan" type="button" onclick="abrirLeitor('gtin')"><i class="bi bi-upc-scan"></i></button>
                </div>
                <div id="nome-produto" class="small mt-1 text-success fw-bold ms-1"></div>
            </div>

            <div class="mb-3">
                <label class="form-label">Data de Validade</label>
                <input type="date" class="form-control" id="input-validade">
            </div>

            <button type="button" class="btn-add" id="btn-adicionar-lista"><i class="bi bi-plus-lg"></i> Adicionar à Vaga</button>
        </div>

        <div class="glass-card d-none" id="card-lista" style="border-left: 5px solid #4caf50;">
            <div class="section-title text-success"><i class="bi bi-list-check"></i> 3. Lista de Entrada</div>
            <div id="lista-pallets"></div>
            <button type="button" class="btn-submit mt-3" id="btn-finalizar-entrada">Gravar no Sistema <i class="bi bi-cloud-arrow-up-fill ms-2"></i></button>
        </div>

    </div>

    <div class="modal fade" id="modalScanner" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 rounded-4">
                <div class="modal-header bg-dark text-white rounded-top-4">
                    <h6 class="modal-title fw-bold">Escanear Código</h6>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close" onclick="fecharLeitor()"></button>
                </div>
                <div class="modal-body p-2 bg-dark">
                    <div id="reader"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalSucesso" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-sm">
            <div class="modal-content border-0 rounded-4 text-center p-4 shadow-lg">
                <div class="modal-body p-0">
                    <i class="bi bi-check-circle-fill modal-success-icon"></i>
                    <h4 class="fw-bold text-dark mt-3">Sucesso!</h4>
                    <p class="text-muted mb-4" id="texto-sucesso">Pallets alocados com sucesso.</p>
                    <button type="button" class="btn btn-submit" style="padding: 10px;" data-bs-dismiss="modal">Continuar</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <script src="dados.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyA_i9BkvMFIXxTTtJA6dyFc2HLXKP-TmHU",
            authDomain: "wms-h7.firebaseapp.com",
            projectId: "wms-h7",
            storageBucket: "wms-h7.firebasestorage.app",
            messagingSenderId: "274655939351",
            appId: "1:274655939351:web:533f7b66d3f421596b8552"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let listaTemporaria = [];
        let html5QrcodeScanner = null;
        let campoAlvo = ''; 

        const inputVaga = document.getElementById('input-vaga');
        const inputGtin = document.getElementById('input-gtin');
        const inputValidade = document.getElementById('input-validade');
        const nomeProduto = document.getElementById('nome-produto');
        const cardLista = document.getElementById('card-lista');
        const divLista = document.getElementById('lista-pallets');
        const modalScanner = new bootstrap.Modal(document.getElementById('modalScanner'));
        const modalSucesso = new bootstrap.Modal(document.getElementById('modalSucesso'));

        inputGtin.addEventListener('input', (e) => {
            const gtin = e.target.value;
            if (catalogoProdutos[gtin]) {
                nomeProduto.innerText = `✓ ${catalogoProdutos[gtin]}`;
            } else {
                nomeProduto.innerText = '';
            }
        });

        document.getElementById('btn-adicionar-lista').addEventListener('click', () => {
            const vaga = inputVaga.value.trim().toUpperCase();
            const gtin = inputGtin.value.trim();
            const validade = inputValidade.value;

            if (!vaga) return alert("Primeiro, defina a Vaga (Destino).");
            if (!gtin) return alert("Informe o código GTIN do produto.");

            const produtoNome = catalogoProdutos[gtin] || "Produto Não Cadastrado";

            listaTemporaria.push({ gtin, validade, nome: produtoNome });
            atualizarListaNaTela();

            inputGtin.value = '';
            nomeProduto.innerText = '';
            inputGtin.focus();
        });

        function atualizarListaNaTela() {
            divLista.innerHTML = '';
            if (listaTemporaria.length > 0) {
                cardLista.classList.remove('d-none');
                listaTemporaria.forEach((item, index) => {
                    const dataFormatada = item.validade ? item.validade.split('-').reverse().join('/') : 'N/I';
                    divLista.innerHTML += `
                        <div class="temp-item shadow-sm">
                            <div class="temp-item-info">
                                <strong>${item.nome}</strong><br>
                                <span class="text-muted"><i class="bi bi-upc"></i> ${item.gtin} | <i class="bi bi-calendar-event"></i> Venc: ${dataFormatada}</span>
                            </div>
                            <button class="btn-remove-item" onclick="removerDaLista(${index})"><i class="bi bi-trash-fill"></i></button>
                        </div>
                    `;
                });
            } else {
                cardLista.classList.add('d-none');
            }
        }

        window.removerDaLista = (index) => {
            listaTemporaria.splice(index, 1);
            atualizarListaNaTela();
        };

        document.getElementById('btn-finalizar-entrada').addEventListener('click', async () => {
            const vaga = inputVaga.value.trim().toUpperCase();
            const dataInclusao = new Date().toISOString();
            const btnConfirmar = document.getElementById('btn-finalizar-entrada');

            btnConfirmar.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Salvando...';
            btnConfirmar.disabled = true;

            try {
                for (const item of listaTemporaria) {
                    await addDoc(collection(db, "inventario_ativo"), {
                        gtin: item.gtin,
                        vaga_id: vaga,
                        validade: item.validade,
                        data_entrada: dataInclusao,
                        status: "ocupada"
                    });
                }

                // Troca o alert nativo pelo Modal customizado
                document.getElementById('texto-sucesso').innerHTML = `<strong>${listaTemporaria.length}</strong> pallet(s) alocado(s) na vaga <strong>${vaga}</strong>.`;
                modalSucesso.show();
                
                listaTemporaria = [];
                inputVaga.value = '';
                inputValidade.value = '';
                atualizarListaNaTela();
                
            } catch (error) {
                console.error("Erro ao salvar:", error);
                alert("Falha ao salvar no banco de dados.");
            } finally {
                btnConfirmar.innerHTML = 'Gravar no Sistema <i class="bi bi-cloud-arrow-up-fill ms-2"></i>';
                btnConfirmar.disabled = false;
            }
        });

        // ======= CÂMERA =======
        window.abrirLeitor = (alvo) => {
            campoAlvo = alvo;
            modalScanner.show();
            
            html5QrcodeScanner = new Html5Qrcode("reader");
            const config = { fps: 10, qrbox: { width: 250, height: 250 } };
            
            html5QrcodeScanner.start({ facingMode: "environment" }, config, onScanSuccess)
            .catch(err => {
                alert("Erro ao acessar a câmera. Verifique as permissões.");
            });
        };

        function onScanSuccess(decodedText, decodedResult) {
            fecharLeitor();
            if (campoAlvo === 'vaga') {
                inputVaga.value = decodedText.toUpperCase();
                inputGtin.focus(); 
            } else if (campoAlvo === 'gtin') {
                inputGtin.value = decodedText;
                inputGtin.dispatchEvent(new Event('input'));
                inputValidade.focus(); 
            }
            try { navigator.vibrate(100); } catch(e){}
        }

        window.fecharLeitor = () => {
            if (html5QrcodeScanner) {
                html5QrcodeScanner.stop().then(() => {
                    html5QrcodeScanner.clear();
                }).catch(err => console.log(err));
            }
            modalScanner.hide();
        };

        document.getElementById('modalScanner').addEventListener('hidden.bs.modal', function () {
            if (html5QrcodeScanner) window.fecharLeitor();
        });
    </script>
</body>
</html>
