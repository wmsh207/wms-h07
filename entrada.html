<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrada de Mercadoria | WMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { background-color: #f4f6f9; }
        .app-header { background-color: #0d6efd; color: white; padding: 15px 0; }
        .card-entrada { border-radius: 12px; border: none; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        
        /* Ajuste do Leitor de Câmera */
        #reader { width: 100%; border-radius: 8px; overflow: hidden; border: none !important; }
        #reader video { object-fit: cover; }
    </style>
</head>
<body>

    <header class="app-header text-center mb-4">
        <div class="container d-flex justify-content-between align-items-center">
            <button class="btn btn-outline-light btn-sm" onclick="window.location.href='index.html'"><i class="bi bi-arrow-left"></i> Voltar</button>
            <h4 class="m-0"><i class="bi bi-box-arrow-in-down"></i> Nova Entrada</h4>
            <div style="width: 65px;"></div>
        </div>
    </header>

    <div class="container">
        <div class="card card-entrada mb-4">
            <div class="card-body p-4">
                
                <div class="mb-4">
                    <label class="form-label fw-bold text-secondary">Código do Produto (GTIN)</label>
                    <div class="input-group input-group-lg shadow-sm">
                        <span class="input-group-text bg-white"><i class="bi bi-upc"></i></span>
                        <input type="number" class="form-control border-start-0 border-end-0" id="produto-gtin" placeholder="Bipe o código de barras..." onblur="buscarNomeProduto()">
                        <button class="btn btn-outline-secondary bg-white border-start-0" type="button" onclick="abrirCamera('produto-gtin')">
                            <i class="bi bi-upc-scan text-primary fs-4"></i>
                        </button>
                    </div>
                    <div id="produto-nome" class="form-text mt-2 fw-bold text-success"></div>
                </div>

                <div class="mb-4">
                    <label class="form-label fw-bold text-secondary">Localização (Vaga / QR Code)</label>
                    <div class="input-group input-group-lg shadow-sm">
                        <span class="input-group-text bg-white"><i class="bi bi-geo-alt"></i></span>
                        <input type="text" class="form-control text-uppercase border-start-0 border-end-0" id="vaga-id" placeholder="Ex: A-1-0-1 ou bipe o QR Code...">
                        <button class="btn btn-outline-secondary bg-white border-start-0" type="button" onclick="abrirCamera('vaga-id')">
                            <i class="bi bi-qr-code-scan text-primary fs-4"></i>
                        </button>
                    </div>
                    <div id="vaga-erro" class="form-text text-danger d-none"><i class="bi bi-x-circle"></i> Vaga não cadastrada no sistema.</div>
                </div>

                <button id="btn-salvar" class="btn btn-primary btn-lg w-100 fw-bold shadow-sm" onclick="salvarEntrada()">
                    <i class="bi bi-check2-circle"></i> Alocar Pallet
                </button>

            </div>
        </div>
    </div>

    <div class="modal fade" id="modalScanner" tabindex="-1" aria-hidden="true" data-bs-backdrop="static">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg">
                <div class="modal-header bg-dark text-white border-0">
                    <h5 class="modal-title"><i class="bi bi-camera-video"></i> Escanear Código</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" id="btn-fechar-modal-scanner"></button>
                </div>
                <div class="modal-body p-0 bg-dark text-center">
                    <div id="reader"></div>
                </div>
                <div class="modal-footer bg-dark border-0">
                    <p class="text-white-50 small w-100 text-center mb-0">Aponte a câmera para o código de barras ou QR Code.</p>
                </div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="dados.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // SUA CONFIGURAÇÃO
        const firebaseConfig = { 
            apiKey: "AIzaSyA_i9BkvMFIXxTTtJA6dyFc2HLXKP-TmHU",
            authDomain: "wms-h7.firebaseapp.com",
            projectId: "wms-h7",
            storageBucket: "wms-h7.firebasestorage.app",
            messagingSenderId: "274655939351",
            appId: "1:274655939351:web:533f7b66d3f421596b8552"
         };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- LÓGICA DA CÂMERA ---
        let html5QrCode;
        let inputDestino = '';

        window.abrirCamera = (idInput) => {
            inputDestino = idInput;
            const modal = new bootstrap.Modal(document.getElementById('modalScanner'));
            modal.show();

            html5QrCode = new Html5Qrcode("reader");
            // Se for vaga (QR Code), lê área quadrada. Se for GTIN (Barra), lê área retangular
            const boxWidth = idInput === 'vaga-id' ? 250 : 250;
            const boxHeight = idInput === 'vaga-id' ? 250 : 150;
            
            html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: { width: boxWidth, height: boxHeight } }, onScanSuccess)
            .catch(err => alert("Erro ao acessar câmera. Permitir acesso é obrigatório."));
        };

        function onScanSuccess(decodedText, decodedResult) {
            if (navigator.vibrate) navigator.vibrate(100); 
            
            const campo = document.getElementById(inputDestino);
            campo.value = decodedText.toUpperCase(); // Força maiúsculo pra Vagas
            
            html5QrCode.stop().then(() => {
                document.getElementById('btn-fechar-modal-scanner').click();
                
                // Se leu o GTIN, já busca o nome do produto sozinho
                if(inputDestino === 'produto-gtin') {
                    window.buscarNomeProduto();
                    document.getElementById('vaga-id').focus(); // Joga o cursor pra vaga
                }
            });
        }

        document.getElementById('modalScanner').addEventListener('hidden.bs.modal', function () {
            if (html5QrCode && html5QrCode.isScanning) html5QrCode.stop().catch(e => console.log(e));
        });

        // --- LÓGICA DE VALIDAÇÃO E SALVAMENTO ---
        const todasAsVagasValidas = Object.values(estruturaDeposito).flat();

        window.buscarNomeProduto = () => {
            const gtin = document.getElementById("produto-gtin").value;
            const nomeDiv = document.getElementById("produto-nome");
            if(gtin && catalogoProdutos[gtin]) {
                nomeDiv.innerText = `📦 ${catalogoProdutos[gtin]}`;
                nomeDiv.className = "form-text mt-2 fw-bold text-success";
            } else if (gtin) {
                nomeDiv.innerText = "⚠️ Produto não encontrado no catálogo local.";
                nomeDiv.className = "form-text mt-2 fw-bold text-danger";
            } else {
                nomeDiv.innerText = "";
            }
        };

        window.salvarEntrada = async () => {
            const gtin = document.getElementById("produto-gtin").value;
            const vaga = document.getElementById("vaga-id").value.toUpperCase();
            const vagaErro = document.getElementById("vaga-erro");

            if (!gtin || !vaga) return alert("Preencha o código do produto e a vaga!");

            if (!todasAsVagasValidas.includes(vaga)) {
                vagaErro.classList.remove("d-none");
                return;
            } else {
                vagaErro.classList.add("d-none");
            }

            const btn = document.getElementById("btn-salvar");
            btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Salvando...';
            btn.disabled = true;

            try {
                await addDoc(collection(db, "inventario_ativo"), {
                    gtin: gtin,
                    vaga_id: vaga,
                    status: "ocupada",
                    data_entrada: serverTimestamp()
                });

                alert("✅ Pallet alocado com sucesso!");
                document.getElementById("produto-gtin").value = "";
                document.getElementById("vaga-id").value = "";
                document.getElementById("produto-nome").innerText = "";
                document.getElementById("produto-gtin").focus(); // Volta para o primeiro campo

            } catch (error) {
                console.error("Erro: ", error);
                alert("Erro ao salvar! Verifique a internet.");
            } finally {
                btn.innerHTML = '<i class="bi bi-check2-circle"></i> Alocar Pallet';
                btn.disabled = false;
            }
        };
    </script>
</body>
</html>
