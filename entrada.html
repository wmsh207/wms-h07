<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrada Real-Time | WMS H-07</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <script type="module">
        import { db } from './config.js';
        import { collection, addDoc, getDocs, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        let bancoProdutos = {};

        // 1. PUXA AS VAGAS E PRODUTOS QUANDO A TELA ABRE
        window.onload = async () => {
            const btn = document.getElementById('btnSalvar');
            btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Carregando Banco...';
            btn.disabled = true;

            try {
                // Carrega Vagas
                const vagasRef = await getDocs(collection(db, "vagas"));
                const selectVaga = document.getElementById('inputVaga');
                selectVaga.innerHTML = '<option value="" disabled selected>Escolha a vaga...</option>';
                vagasRef.forEach((doc) => {
                    selectVaga.innerHTML += `<option value="${doc.id}">${doc.id}</option>`;
                });

                // Carrega Produtos
                const produtosRef = await getDocs(collection(db, "produtos"));
                produtosRef.forEach((doc) => {
                    bancoProdutos[doc.id] = doc.data().nome;
                });

                btn.innerHTML = '<i class="bi bi-lightning-fill"></i> SALVAR INSTANTÂNEO';
                btn.disabled = false;
            } catch (erro) {
                console.error("Erro ao puxar dados: ", erro);
                alert("Erro de conexão com o banco de dados.");
            }
        };

        // 2. FUNÇÃO DA LUPA (Busca o nome digitado)
        window.buscarNome = () => {
            const gtin = String(document.getElementById('inputGtin').value).trim();
            const campoNome = document.getElementById('inputNome');
            
            if (bancoProdutos[gtin]) {
                campoNome.value = bancoProdutos[gtin];
            } else if (gtin.length > 5) {
                campoNome.value = "NÃO ENCONTRADO NO FIREBASE";
            }
        };

        // 3. GRAVAR NO ESTOQUE
        window.salvarNoFirebase = async (dados) => {
            return await addDoc(collection(db, "inventario"), {
                ...dados,
                data_hora: serverTimestamp(),
                status_item: "No Pallet"
            });
        };
    </script>

    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        body { background-color: #f8f9fa; }
        .app-header { background-color: #0d6efd; color: white; padding: 15px 0; }
        #reader { width: 100%; border-radius: 12px; overflow: hidden; border: none !important; }
    </style>
</head>
<body>

    <header class="app-header mb-4 shadow-sm">
        <div class="container d-flex align-items-center">
            <a href="index.html" class="text-white me-3"><i class="bi bi-arrow-left fs-3"></i></a>
            <h4 class="m-0">Entrada Real-Time</h4>
        </div>
    </header>

    <div class="container">
        <div id="reader" class="mb-4 shadow-sm"></div>

        <div class="card border-0 shadow-sm mb-5">
            <div class="card-body">
                <form id="formEntrada">
                    <div class="mb-3">
                        <label class="form-label small fw-bold text-secondary">GTIN / CÓDIGO</label>
                        <div class="input-group">
                            <input type="number" class="form-control form-control-lg" id="inputGtin" required onkeyup="window.buscarNome()">
                            <button class="btn btn-outline-secondary" type="button" onclick="window.buscarNome()"><i class="bi bi-search"></i></button>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label small fw-bold text-secondary">PRODUTO</label>
                        <input type="text" class="form-control bg-light" id="inputNome" placeholder="Aguardando código..." readonly required>
                    </div>

                    <div class="mb-4">
                        <label class="form-label small fw-bold text-secondary">VAGA DE DESTINO</label>
                        <select class="form-select form-select-lg" id="inputVaga" required>
                            <option value="" disabled selected>Carregando vagas...</option>
                        </select>
                    </div>

                    <button type="submit" class="btn btn-primary btn-lg w-100 py-3 shadow" id="btnSalvar" disabled>
                        <span class="spinner-border spinner-border-sm"></span> Aguarde...
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script>
        // Lógica da Câmera
        function onScanSuccess(decodedText) {
            document.getElementById('inputGtin').value = decodedText;
            if(navigator.vibrate) navigator.vibrate(100);
            window.buscarNome(); // Já puxa o nome na hora do bipe!
            
            // Pausa breve para não bipar 10x seguidas
            html5QrcodeScanner.pause();
            setTimeout(() => html5QrcodeScanner.resume(), 3000);
        }

        let html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 15, qrbox: {width: 250, height: 120} }, false);
        html5QrcodeScanner.render(onScanSuccess);

        // Disparo do Formulário
        document.getElementById('formEntrada').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnSalvar');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> PROCESSANDO...';

            const dados = {
                gtin: document.getElementById('inputGtin').value,
                nome: document.getElementById('inputNome').value,
                vaga: document.getElementById('inputVaga').value
            };

            try {
                await window.salvarNoFirebase(dados);
                alert("Salvo com sucesso!");
                document.getElementById('formEntrada').reset();
            } catch (erro) {
                alert("Erro ao gravar: " + erro.message);
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="bi bi-lightning-fill"></i> SALVAR INSTANTÂNEO';
            }
        });
    </script>
</body>
</html>
