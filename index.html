<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WMS H-07 | Gestão de Depósito</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        /* Um pequeno toque de design personalizado para o fundo */
        body {
            background-color: #f4f6f9;
        }
        .app-header {
            background-color: #0d6efd; /* Azul corporativo */
            color: white;
            padding: 15px 0;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .menu-card {
            transition: transform 0.2s;
            cursor: pointer;
            border: none;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
        }
        .menu-card:hover {
            transform: translateY(-5px); /* Efeito de pular ao passar o mouse */
        }
    </style>
</head>
<body>

    <header class="app-header text-center mb-4">
        <div class="container">
            <h2 class="m-0"><i class="bi bi-box-seam"></i> WMS H-07</h2>
            <p class="m-0 text-white-50">Sistema de Gestão de Vagas</p>
        </div>
    </header>

    <div class="container">
        <div class="row g-4">
            
            <div class="col-12 col-md-6">
                <div class="card menu-card h-100 text-center p-4" onclick="window.location.href='entrada.html'">
                    <div class="card-body">
                        <i class="bi bi-upc-scan display-1 text-primary mb-3"></i>
                        <h4 class="card-title">Nova Movimentação</h4>
                        <p class="card-text text-muted">Bipar produtos e alocar em pallets.</p>
                        <button class="btn btn-primary w-100 mt-2">Acessar</button>
                    </div>
                </div>
            </div>

            <div class="col-12 col-md-6">
                <div class="card menu-card h-100 text-center p-4" onclick="window.location.href='consulta.html'">
                    <div class="card-body">
                        <i class="bi bi-search display-1 text-success mb-3"></i>
                        <h4 class="card-title">Consultar Vagas</h4>
                        <p class="card-text text-muted">Pesquisar onde um produto está guardado.</p>
                        <button class="btn btn-success w-100 mt-2">Acessar</button>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
