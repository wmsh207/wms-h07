<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WMS H-07 | Gestão de Depósito</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        body {
            background-color: #f4f6f9;
        }
        .app-header {
            background-color: #0d6efd; /* Azul corporativo */
            color: white;
            padding: 20px 0;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .menu-card {
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
            border: none;
            border-radius: 12px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
        }
        .menu-card:hover {
            transform: translateY(-5px); /* Efeito de pular ao passar o mouse */
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
        }
        .icon-display {
            font-size: 4rem; /* Tamanho padronizado para os ícones */
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

    <header class="app-header text-center mb-5">
        <div class="container">
            <h1 class="m-0 fw-bold"><i class="bi bi-box-seam"></i> WMS H-07</h1>
            <p class="m-0 text-white-50 mt-1">Sistema Integrado de Gestão de Vagas</p>
        </div>
    </header>

    <div class="container">
        <div class="row row-cols-1 row-cols-md-3 g-4">
            
            <div class="col">
                <div class="card menu-card h-100 text-center p-4" onclick="window.location.href='entrada.html'">
                    <div class="card-body d-flex flex-column">
                        <i class="bi bi-upc-scan icon-display text-primary"></i>
                        <h4 class="card-title fw-bold">Entrada</h4>
                        <p class="card-text text-muted flex-grow-1">Bipar códigos e alocar pallets nas vagas do armazém.</p>
                        <button class="btn btn-primary w-100 mt-3 rounded-pill fw-bold">Acessar</button>
                    </div>
                </div>
            </div>

            <div class="col">
                <div class="card menu-card h-100 text-center p-4" onclick="window.location.href='consulta.html'">
                    <div class="card-body d-flex flex-column">
                        <i class="bi bi-search icon-display text-success"></i>
                        <h4 class="card-title fw-bold">Consulta</h4>
                        <p class="card-text text-muted flex-grow-1">Pesquisar onde os produtos estão guardados fisicamente.</p>
                        <button class="btn btn-success w-100 mt-3 rounded-pill fw-bold">Acessar</button>
                    </div>
                </div>
            </div>

            <div class="col">
                <div class="card menu-card h-100 text-center p-4" onclick="window.location.href='mapa.html'">
                    <div class="card-body d-flex flex-column">
                        <i class="bi bi-map-fill icon-display text-warning"></i>
                        <h4 class="card-title fw-bold">Heat Map</h4>
                        <p class="card-text text-muted flex-grow-1">Visão global da ocupação e disponibilidade dos corredores.</p>
                        <button class="btn btn-warning w-100 mt-3 rounded-pill fw-bold text-dark">Acessar</button>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
