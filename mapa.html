<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa de Elevação | WMS H-07</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        
        body { background-color: #f4f7fe; font-family: 'Inter', sans-serif; padding-bottom: 70px; }

        /* Cabeçalho Premium H-07 */
        .main-header {
            background: linear-gradient(135deg, #034EA1 0%, #007bff 100%);
            padding: 30px 20px 60px;
            border-radius: 0 0 35px 35px;
            color: white;
            box-shadow: 0 10px 20px rgba(3, 78, 161, 0.15);
        }

        .content-container { margin-top: -40px; padding: 0 15px; }

        /* Card Moderno para os Corredores */
        .glass-card {
            background: #ffffff;
            border-radius: 20px;
            border: none;
            padding: 25px 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.04);
            margin-bottom: 25px;
            overflow-x: auto;
        }

        .section-title { color: #2b3674; font-weight: 800; font-size: 1.2rem; margin-bottom: 20px; display: flex; align-items: center; border-bottom: 2px solid #e0e5f2; padding-bottom: 10px; }
        .section-title i { font-size: 1.4rem; margin-right: 8px; color: #034EA1; }

        /* === ESTRUTURA DO DEPÓSITO === */
        .estante-container { display: flex; gap: 15px; padding-bottom: 15px; align-items: flex-end; }
        .modulo-coluna { display: flex; flex-direction: column; width: 130px; flex-shrink: 0; }
        .modulo-header { background-color: #2b3674; color: #ffffff; font-weight: 700; text-align: center; padding: 6px; border-radius: 8px 8px 0 0; font-size: 0.85rem; letter-spacing: 0.5px; }
        .modulo-shelf-area { background-color: #f8f9ff; border-left: 6px solid #e0e5f2; border-right: 6px solid #e0e5f2; padding: 5px 8px; position: relative; }
        .shelf-divider { height: 6px; background-color: #fd7e14; margin-top: -3px; border-radius: 2px; box-shadow: 0 2px 4px rgba(253, 126, 20, 0.2); }
        .shelf-level { display: flex; justify-content: center; gap: 5px; padding: 12px 0; position: relative; }
        
        .vaga-spot { width: 55px; height: 40px; border: 2px dashed #c0c7d6; border-radius: 6px; position: relative; cursor: pointer; transition: transform 0.2s; }
        .vaga-spot:hover { transform: scale(1.05); z-index: 10; }

        .vaga-block-occupied { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(180deg, #e53935 0%, #c62828 100%); border-radius: 4px; border-bottom: 3px solid #8e0000; box-shadow: 0 4px 8px rgba(229, 57, 53, 0.3); }
        
        .vaga-alerta-vencimento { animation: pulse-danger 1.5s infinite; border: 2px solid #ffc107; }
        @keyframes pulse-danger {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(220, 53, 69, 0.6); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 12px rgba(220, 53, 69, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(220, 53, 69, 0); }
        }

        .level-tag { position: absolute; right: -10px; top: 50%; transform: translateY(-50%); color: #8f9bba; font-weight: 800; font-size: 0.65rem; }

        /* Gestão / Itens do Modal */
        .item-gestao { background: #f8f9ff; border: 1px solid #e0e5f2; border-radius: 12px; margin-bottom: 10px; position: relative; transition: all 0.2s; }
        .item-gestao:hover { background-color: #ffffff; box-shadow: 0 5px 15px rgba(0,0,0,0.05); border-color: #4318FF; }
        .btn-acao { border: none; background: #e0eaff; border-radius: 8px; padding: 8px 12px; font-size: 1.1rem; transition: all 0.2s; }
        .btn-acao:hover { transform: scale(1.1); }
        .btn-mover { color: #4318FF; }
        .btn-excluir { background: #ffebee; color: #dc3545; }

        /* Inputs dos novos modais */
        .form-control-modern { border-radius: 12px; padding: 12px; border: 2px solid #e0e5f2; color: #2b3674; font-weight: 600; width: 100%; text-align: center; }
        .form-control-modern:focus { border-color: #4318FF; box-shadow: none; outline: none; background-color: #f8f9ff; }
        .btn-modal-action { border-radius: 12px; padding: 12px; font-weight: 700; width: 100%; transition: all 0.2s; }
        
        .icon-huge { font-size: 4rem; margin-bottom: 10px; }
        .icon-move { color: #4318FF; }
        .icon-delete { color: #dc3545; }
    </style>
</head>
<body>

    <header class="main-header text-center">
        <div class="container d-flex justify-content-between align-items-center">
            <button class="btn btn-link text-white p-0" onclick="window.location.href='index.html'"><i class="bi bi-chevron-left fs-4"></i></button>
            <h5 class="m-0 fw-bold">Mapa do Depósito</h5>
            <div style="width: 24px;"></div> 
        </div>
    </header>

    <div class="container content-container">
        <div id="layout-vertical">
            <div class="text-center py-5">
                <div class="spinner-border text-white" style="width: 3rem; height: 3rem;"></div>
                <p class="text-white-50 mt-3 fw-bold">Renderizando estantes...</p>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalVaga" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 rounded-4 shadow-lg">
                <div class="modal-header text-white rounded-top-4" style="background: #2b3674;">
                    <h6 class="modal-title fw-bold" id="m-title"><i class="bi bi-geo-alt-fill me-2 text-warning"></i>Vaga</h6>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-3 bg-white rounded-bottom-4">
                    <div id="m-body" class="d-flex flex-column gap-2">
                        </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalMover" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-sm">
            <div class="modal-content border-0 rounded-4 p-3 text-center shadow-lg">
                <div class="modal-body p-2">
                    <i class="bi bi-arrow-left-right icon-huge icon-move"></i>
                    <h5 class="fw-bold text-dark mt-2">Mover Mercadoria</h5>
                    <p class="text-muted small mb-3">Digite o endereço da nova vaga de destino.</p>
                    
                    <input type="text" id="input-nova-vaga" class="form-control-modern text-uppercase mb-3" placeholder="Ex: A-1-0-1">
                    
                    <div class="row g-2">
                        <div class="col-6">
                            <button class="btn btn-light btn-modal-action text-muted" onclick="cancelarAcao()">Voltar</button>
                        </div>
                        <div class="col-6">
                            <button class="btn btn-primary btn-modal-action" id="btn-confirmar-mover" style="background-color: #4318FF; border: none;">Mover</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalExcluir" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-sm">
            <div class="modal-content border-0 rounded-4 p-3 text-center shadow-lg">
                <div class="modal-body p-2">
                    <i class="bi bi-exclamation-triangle-fill icon-huge icon-delete"></i>
                    <h5 class="fw-bold text-dark mt-2">Remover Produto?</h5>
                    <p class="text-muted small mb-3">Esta ação removerá o pallet desta vaga permanentemente.</p>
                    
                    <div class="row g-2">
                        <div class="col-6">
                            <button class="btn btn-light btn-modal-action text-muted" onclick="cancelarAcao()">Cancelar</button>
                        </div>
                        <div class="col-6">
                            <button class="btn btn-danger btn-modal-action" id="btn-confirmar-excluir">Excluir</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="dados.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, getDocs, doc, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // COLOQUE SUAS CHAVES DO FIREBASE AQUI
        const firebaseConfig = {
            apiKey: "AIzaSyA_i9BkvMFIXxTTtJA6dyFc2HLXKP-TmHU",
            authDomain: "wms-h7.firebaseapp.com",
            projectId: "wms-h7",
            storageBucket: "wms-h7.firebasestorage.app",
            messagingSenderId: "274655939351",
            appId: "1:274655939351:web:533f7b66d3f421596b8552"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let estoque = {};
        
        // Instâncias dos Modais do Bootstrap
        const bsModalVaga = new bootstrap.Modal(document.getElementById('modalVaga'));
        const bsModalMover = new bootstrap.Modal(document.getElementById('modalMover'));
        const bsModalExcluir = new bootstrap.Modal(document.getElementById('modalExcluir'));

        // Variáveis de estado para guardar qual item está sendo alterado
        let alvoDocId = null;
        let alvoVagaAtual = null;

        async function init() {
            try {
                const snap = await getDocs(collection(db, "inventario_ativo"));
                estoque = {};
                snap.forEach(d => {
                    const data = d.data();
                    if(data.status === "ocupada") {
                        if(!estoque[data.vaga_id]) estoque[data.vaga_id] = [];
                        estoque[data.vaga_id].push({ id: d.id, ...data });
                    }
                });
                desenharPrateleiras();
            } catch(e) {
                document.getElementById('layout-vertical').innerHTML = `<div class="alert alert-danger rounded-4 text-center">Falha ao conectar com o banco de dados.</div>`;
            }
        }

        function desenharPrateleiras() {
            const container = document.getElementById('layout-vertical');
            container.innerHTML = '';

            const dataHoje = new Date();
            const limiteAlerta = new Date();
            limiteAlerta.setDate(dataHoje.getDate() + 30);

            for (const [corredorNome, vagas] of Object.entries(estruturaDeposito)) {
                const corridorCard = document.createElement('div');
                corridorCard.className = 'glass-card';
                corridorCard.innerHTML = `<h5 class="section-title"><i class="bi bi-layers-half"></i> Corredor ${corredorNome}</h5>`;
                
                const estanteDiv = document.createElement('div');
                estanteDiv.className = 'estante-container';

                const modulosMap = {};
                vagas.forEach(v => {
                    const partes = v.split('-');
                    const modId = partes[1];
                    if(!modulosMap[modId]) modulosMap[modId] = {};
                    const nivelId = partes[2];
                    if(!modulosMap[modId][nivelId]) modulosMap[modId][nivelId] = [];
                    modulosMap[modId][nivelId].push(v);
                });

                Object.keys(modulosMap).sort((a,b) => a-b).forEach(modId => {
                    const col = document.createElement('div');
                    col.className = 'modulo-coluna';
                    col.innerHTML = `<div class="modulo-header">${corredorNome}-${modId}</div>`;

                    const shelfArea = document.createElement('div');
                    shelfArea.className = 'modulo-shelf-area';

                    Object.keys(modulosMap[modId]).sort((a,b) => b-a).forEach(nivelId => {
                        const levelRow = document.createElement('div');
                        levelRow.className = 'shelf-level';
                        levelRow.innerHTML = `<span class="level-tag">N${nivelId}</span>`;

                        modulosMap[modId][nivelId].forEach(vagaId => {
                            const pallets = estoque[vagaId] || [];
                            const spot = document.createElement('div');
                            spot.className = 'vaga-spot';

                            if(pallets.length > 0) {
                                const temVencimentoProximo = pallets.some(p => {
                                    if(!p.validade) return false;
                                    const dVenc = new Date(p.validade + 'T12:00:00');
                                    return dVenc <= limiteAlerta;
                                });

                                const classeAlerta = temVencimentoProximo ? 'vaga-alerta-vencimento' : '';
                                spot.innerHTML = `<div class="vaga-block-occupied ${classeAlerta}"></div>`;
                            }
                            
                            spot.onclick = () => mostrarGestao(vagaId, pallets, limiteAlerta);
                            levelRow.appendChild(spot);
                        });
                        shelfArea.appendChild(levelRow);
                        
                        const divider = document.createElement('div');
                        divider.className = 'shelf-divider';
                        shelfArea.appendChild(divider);
                    });
                    col.appendChild(shelfArea);
                    estanteDiv.appendChild(col);
                });
                
                corridorCard.appendChild(estanteDiv);
                container.appendChild(corridorCard);
            }
        }

        window.mostrarGestao = (vagaId, pallets, limiteAlerta) => {
            document.getElementById('m-title').innerHTML = `<i class="bi bi-geo-alt-fill me-2 text-warning"></i> Endereço: ${vagaId}`;
            const body = document.getElementById('m-body');
            
            body.innerHTML = pallets.length ? pallets.map(p => {
                const dVenc = p.validade ? new Date(p.validade + 'T12:00:00') : null;
                const isCritico = dVenc && dVenc <= limiteAlerta;
                const borderClass = isCritico ? 'border-start border-danger border-4' : '';
                const corData = isCritico ? 'text-danger fw-bold' : 'text-muted';

                return `
                <div class="list-group-item item-gestao p-3 d-flex justify-content-between align-items-center ${borderClass}">
                    <div>
                        <div class="fw-bold" style="color: #2b3674; font-size: 0.95rem;">
                            ${catalogoProdutos[p.gtin] || 'Produto: ' + p.gtin} 
                            ${isCritico ? '<i class="bi bi-exclamation-triangle-fill text-danger ms-1"></i>' : ''}
                        </div>
                        <div class="small text-muted mt-1"><i class="bi bi-upc"></i> GTIN: ${p.gtin}</div>
                        <div class="small mt-1 ${corData}"><i class="bi bi-calendar-event"></i> Vencimento: ${p.validade ? p.validade.split('-').reverse().join('/') : 'N/I'}</div>
                    </div>
                    <div class="acoes-icones ms-2">
                        <button class="btn-acao btn-mover" onclick="abrirModalMover('${p.id}', '${vagaId}')" title="Mover Pallet">
                            <i class="bi bi-arrow-left-right"></i>
                        </button>
                        <button class="btn-acao btn-excluir" onclick="abrirModalExcluir('${p.id}')" title="Remover Pallet">
                            <i class="bi bi-trash3-fill"></i>
                        </button>
                    </div>
                </div>`;
            }).join('') : `
                <div class="p-4 text-center">
                    <i class="bi bi-box text-muted" style="font-size: 3rem; opacity: 0.5;"></i>
                    <h6 class="mt-3 text-muted fw-bold">Vaga Livre</h6>
                    <p class="small text-muted mb-0">Nenhum pallet armazenado neste endereço.</p>
                </div>
            `;
            
            bsModalVaga.show();
        }

        // ==========================================
        // LÓGICA DOS NOVOS MODAIS (MOVER E EXCLUIR)
        // ==========================================

        // Botão Cancelar/Voltar de qualquer sub-modal
        window.cancelarAcao = () => {
            bsModalMover.hide();
            bsModalExcluir.hide();
            bsModalVaga.show(); // Volta para a tela da vaga
        }

        // --- FLUXO DE EXCLUSÃO ---
        window.abrirModalExcluir = (docId) => {
            alvoDocId = docId;
            bsModalVaga.hide();
            bsModalExcluir.show();
        }

        document.getElementById('btn-confirmar-excluir').addEventListener('click', async () => {
            const btn = document.getElementById('btn-confirmar-excluir');
            btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span>';
            btn.disabled = true;

            try {
                await deleteDoc(doc(db, "inventario_ativo", alvoDocId));
                bsModalExcluir.hide();
                init(); // Atualiza o mapa
            } catch (error) {
                alert("Erro ao excluir.");
            } finally {
                btn.innerHTML = 'Excluir';
                btn.disabled = false;
            }
        });

        // --- FLUXO DE MOVIMENTAÇÃO ---
        window.abrirModalMover = (docId, vagaAtual) => {
            alvoDocId = docId;
            alvoVagaAtual = vagaAtual;
            document.getElementById('input-nova-vaga').value = vagaAtual; // Preenche com a atual
            bsModalVaga.hide();
            bsModalMover.show();
        }

        document.getElementById('btn-confirmar-mover').addEventListener('click', async () => {
            const inputVaga = document.getElementById('input-nova-vaga');
            const novaVaga = inputVaga.value.trim().toUpperCase();
            
            if(!novaVaga || novaVaga === alvoVagaAtual) {
                alert("Digite um endereço válido e diferente do atual.");
                return inputVaga.focus();
            }

            const btn = document.getElementById('btn-confirmar-mover');
            btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span>';
            btn.disabled = true;

            try {
                await updateDoc(doc(db, "inventario_ativo", alvoDocId), { vaga_id: novaVaga });
                bsModalMover.hide();
                init(); // Atualiza o mapa
            } catch (error) {
                alert("Erro ao transferir.");
            } finally {
                btn.innerHTML = 'Mover';
                btn.disabled = false;
            }
        });

        // Inicia carregando o mapa
        init();
    </script>
</body>
</html>
