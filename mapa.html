<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa de Vagas | WMS H-07</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        
        body { background-color: #f4f7fe; font-family: 'Inter', sans-serif; padding-bottom: 20px; }

        .main-header {
            background: linear-gradient(135deg, #034EA1 0%, #007bff 100%);
            padding: 30px 20px 60px;
            border-radius: 0 0 35px 35px;
            color: white;
            box-shadow: 0 10px 20px rgba(3, 78, 161, 0.15);
        }
        .content-container { margin-top: -40px; padding: 0 15px; }

        .glass-card {
            background: #ffffff; border-radius: 20px; border: none;
            padding: 20px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.04); margin-bottom: 20px;
        }

        .section-title { color: #2b3674; font-weight: 800; font-size: 1.1rem; margin-bottom: 15px; display: flex; align-items: center; border-bottom: 2px solid #e0e5f2; padding-bottom: 10px;}

        /* ESTRUTURA PORTA-PALETES */
        .corredor-container { display: flex; gap: 12px; overflow-x: auto; padding: 10px 5px 20px 5px; align-items: flex-end; }
        .rack-module { display: flex; flex-direction: column; width: 120px; flex-shrink: 0; }
        .rack-header { background: #303f9f; color: white; text-align: center; padding: 8px; font-weight: 800; border-radius: 8px 8px 0 0; font-size: 0.9rem; }
        .rack-body { background: #f8f9ff; border-left: 6px solid #e8eaf6; border-right: 6px solid #e8eaf6; padding: 5px 10px; display: flex; flex-direction: column-reverse; gap: 12px; }
        .rack-level { display: flex; justify-content: space-around; border-bottom: 4px solid #ff9800; padding-bottom: 5px; position: relative; }
        .level-label { position: absolute; right: -8px; bottom: 5px; font-size: 0.65rem; color: #9e9e9e; font-weight: 800; }
        
        .vaga-slot { width: 40px; height: 35px; border-radius: 4px; cursor: pointer; transition: all 0.2s; }
        .vaga-livre { border: 2px dashed #b0bec5; background: transparent; }
        .vaga-ocupada { background: #d32f2f; box-shadow: 0 4px 6px rgba(211, 47, 47, 0.4); border: 1px solid #b71c1c; }
        .vaga-ocupada:hover { transform: scale(1.1); z-index: 10; }

        /* ==========================================
           ANIMAÇÃO DE VENCIMENTO PRÓXIMO (< 30 DIAS)
           ========================================== */
        @keyframes pulse-alerta {
            0% { background-color: #d32f2f; transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 82, 82, 0.7); }
            50% { background-color: #ff5252; transform: scale(1.05); box-shadow: 0 0 10px 5px rgba(255, 82, 82, 0.5); border: 2px solid #ffeb3b; }
            100% { background-color: #d32f2f; transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 82, 82, 0); }
        }
        .vaga-alerta {
            animation: pulse-alerta 1.5s infinite;
            z-index: 5;
        }

        /* MODAL PRINCIPAL E CARDS */
        .modal-header-custom { background-color: #2b3674; color: white; padding: 15px 20px; border-radius: 12px 12px 0 0; display: flex; justify-content: space-between; align-items: center; }
        .modal-header-custom h5 { margin: 0; font-size: 1.1rem; font-weight: 700; display: flex; align-items: center; }
        .modal-header-custom i { color: #ffeb3b; font-size: 1.2rem; margin-right: 8px; }
        .btn-close-white { background: transparent; border: none; color: white; font-size: 1.5rem; cursor: pointer; line-height: 1; }

        .pallet-card { background: #ffffff; border: 1px solid #e0e5f2; border-radius: 4px; padding: 15px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
        .pallet-info-container { flex: 1; padding-right: 15px; }
        .pallet-title { font-weight: 700; color: #2b3674; font-size: 0.95rem; margin-bottom: 8px; line-height: 1.3; }
        .pallet-detail-row { font-size: 0.85rem; color: #6c757d; margin-bottom: 4px; display: flex; align-items: center; }
        .pallet-detail-row i { margin-right: 6px; color: #8f9bba; }

        .pallet-actions { display: flex; flex-direction: column; gap: 10px; }
        .btn-icon-action { width: 45px; height: 45px; border-radius: 8px; border: none; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; transition: all 0.2s; }
        .btn-mudar-soft { background-color: #e8eaf6; color: #3f51b5; }
        .btn-mudar-soft:hover { background-color: #3f51b5; color: white; }
        .btn-excluir-soft { background-color: #ffebee; color: #d32f2f; }
        .btn-excluir-soft:hover { background-color: #d32f2f; color: white; }

        /* MODAIS PEQUENOS */
        .modal-icon-lg { font-size: 3.5rem; line-height: 1; margin-bottom: 15px; }
        .input-vaga-custom { border: 2px solid #e0e5f2; border-radius: 12px; padding: 15px; font-size: 1.2rem; letter-spacing: 2px; }
        .input-vaga-custom:focus { border-color: #3f51b5; box-shadow: 0 0 0 4px rgba(63, 81, 181, 0.1); }

        /* LEGENDA */
        .legenda-item { font-size: 0.75rem; font-weight: 700; color: #6c757d; display: flex; align-items: center; gap: 5px;}
        .bola { width: 12px; height: 12px; border-radius: 3px; display: inline-block; }
    </style>
</head>
<body>

    <header class="main-header text-center">
        <div class="container d-flex justify-content-between align-items-center">
            <button class="btn btn-link text-white p-0" onclick="window.location.href='index.html'"><i class="bi bi-chevron-left fs-4"></i></button>
            <h5 class="m-0 fw-bold">Mapa H-07</h5>
            <div style="width: 24px;"></div>
        </div>
    </header>

    <div class="container content-container">
        
        <div class="glass-card mb-3">
            <div class="section-title text-primary"><i class="bi bi-funnel-fill me-2"></i> Filtro de Corredor</div>
            <select class="form-select form-control mb-3" id="select-corredor" style="border-radius: 12px; font-weight: 700;">
                <option value="A">Corredor A</option>
                <option value="B" selected>Corredor B</option>
                <option value="C">Corredor C</option>
                <option value="D">Corredor D</option>
            </select>
            
            <div class="d-flex justify-content-center gap-3 flex-wrap border-top pt-3">
                <div class="legenda-item"><span class="bola" style="border: 2px dashed #b0bec5;"></span> Livre</div>
                <div class="legenda-item"><span class="bola" style="background: #d32f2f;"></span> Ocupado</div>
                <div class="legenda-item"><span class="bola" style="background: #ff5252; border: 2px solid #ffeb3b; animation: pulse-alerta 1.5s infinite;"></span> Vence < 30 dias</div>
            </div>
        </div>

        <div class="glass-card">
            <div id="grid-mapa" class="corredor-container">
                <p class="text-center text-muted w-100 py-4">Carregando mapa...</p>
            </div>
        </div>

        <div class="modal fade" id="modalVaga" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content border-0 rounded-4 shadow-lg overflow-hidden">
                    <div class="modal-header-custom">
                        <h5><i class="bi bi-geo-alt-fill"></i> Endereço: <span id="modal-vaga-id" class="ms-1"></span></h5>
                        <button type="button" class="btn-close-white" data-bs-dismiss="modal"><i class="bi bi-x-lg"></i></button>
                    </div>
                    <div class="modal-body p-4 bg-light">
                        <div id="detalhes-produto" style="max-height: 60vh; overflow-y: auto; overflow-x: hidden;"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="modal fade" id="modalConfirmarExclusao" tabindex="-1" aria-hidden="true" style="z-index: 1060;">
            <div class="modal-dialog modal-dialog-centered modal-sm">
                <div class="modal-content border-0 rounded-4 p-4 shadow-lg text-center">
                    <i class="bi bi-exclamation-triangle-fill text-danger modal-icon-lg"></i>
                    <h5 class="fw-bold text-dark mb-2">Retirar Produto?</h5>
                    <p class="text-muted small mb-4">Esta ação vai remover o produto desta vaga no estoque. Deseja continuar?</p>
                    <div class="row g-2">
                        <div class="col-6"><button class="btn btn-light w-100 fw-bold text-muted rounded-3" data-bs-dismiss="modal">Cancelar</button></div>
                        <div class="col-6"><button class="btn btn-danger w-100 fw-bold rounded-3" id="btn-confirmar-exclusao">Retirar</button></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="modal fade" id="modalMudarVaga" tabindex="-1" aria-hidden="true" style="z-index: 1060;">
            <div class="modal-dialog modal-dialog-centered modal-sm">
                <div class="modal-content border-0 rounded-4 p-4 shadow-lg text-center">
                    <i class="bi bi-arrow-left-right text-primary modal-icon-lg"></i>
                    <h5 class="fw-bold text-dark mb-2">Mover Produto</h5>
                    <p class="text-muted small mb-3">Digite o código do novo endereço:</p>
                    <input type="text" id="input-nova-vaga" class="form-control text-center text-uppercase fw-bold input-vaga-custom mb-4" placeholder="A-05-02" autocomplete="off">
                    <div class="row g-2">
                        <div class="col-6"><button class="btn btn-light w-100 fw-bold text-muted rounded-3" data-bs-dismiss="modal">Cancelar</button></div>
                        <div class="col-6"><button class="btn btn-primary w-100 fw-bold rounded-3" id="btn-confirmar-mudanca">Mover</button></div>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="dados.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // === COLOQUE SUAS CHAVES DO FIREBASE AQUI ===
        const firebaseConfig = {
            apiKey: "AIzaSyA_i9BkvMFIXxTTtJA6dyFc2HLXKP-TmHU",
            authDomain: "wms-h7.firebaseapp.com",
            projectId: "wms-h7",
            storageBucket: "wms-h7.firebasestorage.app",
            messagingSenderId: "274655939351",
            appId: "1:274655939351:web:533f7b66d3f421596b8552"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const grid = document.getElementById('grid-mapa');
        const selectCorredor = document.getElementById('select-corredor');
        
        const modalLista = new bootstrap.Modal(document.getElementById('modalVaga'));
        const modalConfirmarExclusao = new bootstrap.Modal(document.getElementById('modalConfirmarExclusao'));
        const modalMudarVaga = new bootstrap.Modal(document.getElementById('modalMudarVaga'));
        
        let inventarioCache = [];
        let palletAcaoAtualId = null;

        onSnapshot(collection(db, "inventario_ativo"), (snapshot) => {
            inventarioCache = [];
            snapshot.forEach(doc => inventarioCache.push({ id: doc.id, ...doc.data() }));
            renderizarMapa();
        });

        selectCorredor.onchange = renderizarMapa;

        function renderizarMapa() {
            const corredorRef = selectCorredor.value;
            const vagasNoCorredor = estruturaDeposito[corredorRef] || [];
            
            // LÓGICA DO ALERTA: +30 DIAS DA DATA DE HOJE
            const dataLimiteVencimento = new Date();
            dataLimiteVencimento.setDate(dataLimiteVencimento.getDate() + 30);
            
            const modulos = {};
            vagasNoCorredor.forEach(vagaId => {
                const partes = vagaId.split('-'); 
                const mod = partes[1] || '1';
                const nivel = partes[2] || '0';
                if (!modulos[mod]) modulos[mod] = {};
                if (!modulos[mod][nivel]) modulos[mod][nivel] = [];
                modulos[mod][nivel].push(vagaId);
            });

            const chavesModulos = Object.keys(modulos).sort((a,b) => a - b);

            grid.innerHTML = chavesModulos.map(mod => {
                const niveis = Object.keys(modulos[mod]).sort((a,b) => a - b);
                const htmlNiveis = niveis.map(nivel => {
                    const slots = modulos[mod][nivel].sort();
                    
                    const htmlSlots = slots.map(vagaId => {
                        // Filtra todos os pallets desta vaga
                        const itensNaVaga = inventarioCache.filter(i => i.vaga_id === vagaId && i.status === 'ocupada');
                        
                        let classe = 'vaga-livre';
                        
                        if (itensNaVaga.length > 0) {
                            classe = 'vaga-ocupada';
                            
                            // Verifica se ALGUM dos pallets tem validade menor ou igual a 30 dias
                            const alertaVencimento = itensNaVaga.some(item => {
                                if (!item.validade || item.validade === 'N/I') return false;
                                // Converte string "YYYY-MM-DD" para Date com horário neutro
                                const dataValidade = new Date(item.validade + 'T12:00:00');
                                return dataValidade <= dataLimiteVencimento;
                            });
                            
                            if (alertaVencimento) {
                                classe = 'vaga-ocupada vaga-alerta';
                            }
                        }
                        
                        return `<div class="vaga-slot ${classe}" onclick="verDetalhes('${vagaId}')"></div>`;
                    }).join('');

                    return `<div class="rack-level">${htmlSlots}<span class="level-label">N${nivel}</span></div>`;
                }).join('');

                return `<div class="rack-module"><div class="rack-header">${corredorRef}-${mod}</div><div class="rack-body">${htmlNiveis}</div></div>`;
            }).join('');
        }

        window.verDetalhes = (vagaId) => {
            const itensNaVaga = inventarioCache.filter(i => i.vaga_id === vagaId && i.status === 'ocupada');
            
            document.getElementById('modal-vaga-id').innerText = vagaId;
            const container = document.getElementById('detalhes-produto');

            if (itensNaVaga.length === 0) {
                container.innerHTML = `<p class="text-center text-muted py-5">Nenhum pallet alocado nesta vaga.</p>`;
            } else {
                container.innerHTML = itensNaVaga.map(item => {
                    const d = item.data_entrada?.toDate ? item.data_entrada.toDate() : new Date(item.data_entrada);
                    const entrada = d.toLocaleString('pt-BR', {day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit'});
                    const nome = catalogoProdutos[item.gtin] || "Desconhecido";
                    const validade = item.validade || 'N/I';
                    
                    // Colore a validade de vermelho caso esteja muito próxima ou vencida
                    let corValidade = '#6c757d';
                    if (validade !== 'N/I') {
                        const dl = new Date(); dl.setDate(dl.getDate() + 30);
                        if (new Date(item.validade + 'T12:00:00') <= dl) {
                            corValidade = '#d32f2f'; // Fica vermelho no texto do modal também
                        }
                    }

                    return `
                    <div class="pallet-card">
                        <div class="pallet-info-container">
                            <div class="pallet-title">${nome}</div>
                            <div class="pallet-detail-row"><i class="bi bi-upc-scan"></i> GTIN: ${item.gtin}</div>
                            <div class="pallet-detail-row"><i class="bi bi-calendar"></i> Vencimento: <span style="color: ${corValidade}; font-weight: bold; margin-left: 4px;">${validade}</span></div>
                            <div class="pallet-detail-row"><i class="bi bi-clock-history"></i> Entrada: ${entrada}</div>
                        </div>
                        <div class="pallet-actions">
                            <button class="btn-icon-action btn-mudar-soft" onclick="abrirModalMudar('${item.id}')" title="Mover de Vaga">
                                <i class="bi bi-arrow-left-right"></i>
                            </button>
                            <button class="btn-icon-action btn-excluir-soft" onclick="abrirModalExcluir('${item.id}')" title="Retirar do Estoque">
                                <i class="bi bi-trash3"></i>
                            </button>
                        </div>
                    </div>`;
                }).join('');
            }
            modalLista.show();
        };

        window.abrirModalExcluir = (idPallet) => {
            palletAcaoAtualId = idPallet;
            modalConfirmarExclusao.show();
        };

        document.getElementById('btn-confirmar-exclusao').addEventListener('click', async () => {
            const btn = document.getElementById('btn-confirmar-exclusao');
            btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span>';
            
            if (palletAcaoAtualId) {
                await deleteDoc(doc(db, "inventario_ativo", palletAcaoAtualId));
                modalConfirmarExclusao.hide();
                modalLista.hide();
            }
            btn.innerHTML = 'Retirar';
        });

        window.abrirModalMudar = (idPallet) => {
            palletAcaoAtualId = idPallet;
            document.getElementById('input-nova-vaga').value = '';
            modalMudarVaga.show();
        };

        document.getElementById('btn-confirmar-mudanca').addEventListener('click', async () => {
            const novaVaga = document.getElementById('input-nova-vaga').value.trim().toUpperCase();
            const btn = document.getElementById('btn-confirmar-mudanca');
            
            if (!novaVaga) return alert("Digite o código da vaga!");

            btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span>';
            
            if (palletAcaoAtualId) {
                await updateDoc(doc(db, "inventario_ativo", palletAcaoAtualId), { vaga_id: novaVaga });
                modalMudarVaga.hide();
                modalLista.hide();
            }
            btn.innerHTML = 'Mover';
        });

    </script>
</body>
</html>
