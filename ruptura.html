<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auditoria de Ruptura | WMS H-07</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        
        body { background-color: #f4f7fe; font-family: 'Inter', sans-serif; padding-bottom: 70px; }

        .main-header {
            background: linear-gradient(135deg, #034EA1 0%, #007bff 100%);
            padding: 30px 20px 60px;
            border-radius: 0 0 35px 35px;
            color: white;
            box-shadow: 0 10px 20px rgba(3, 78, 161, 0.15);
        }

        .content-container { margin-top: -40px; padding: 0 15px; }

        .nav-pills .nav-link { 
            background: #ffffff; color: #8f9bba; font-weight: 700; 
            border-radius: 15px; margin: 0 5px; padding: 12px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.03); transition: all 0.3s;
        }
        .nav-pills .nav-link.active { 
            background: #4318FF; color: white; 
            box-shadow: 0 8px 15px rgba(67, 24, 255, 0.3); transform: translateY(-2px);
        }

        .glass-card {
            background: #ffffff; border-radius: 20px; border: none;
            padding: 20px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.04); margin-bottom: 20px;
        }

        .section-title { color: #2b3674; font-weight: 800; font-size: 1.1rem; margin-bottom: 15px; display: flex; align-items: center; }
        
        .form-control { border-radius: 12px; padding: 12px; border: 2px solid #e0e5f2; color: #2b3674; font-weight: 500; }
        .form-control:focus { border-color: #4318FF; box-shadow: none; background-color: #f8f9ff; }
        
        .btn-action { border-radius: 12px; padding: 12px; font-weight: 700; width: 100%; transition: all 0.2s; border: none; }
        .btn-import { background: #034EA1; color: white; }
        .btn-clear { background: #ffebee; color: #c62828; border: 1px solid #ffcdd2; }
        
        .btn-print-80 { background: #212529; color: #ffc107; border: none; border-radius: 8px; padding: 5px 10px; font-weight: bold;}
        .btn-print-a4 { background: #0288d1; color: white; border: none; border-radius: 8px; padding: 5px 10px; font-weight: bold;}

        .item-card { background: #f8f9ff; border: 1px solid #e0e5f2; border-radius: 15px; padding: 15px; margin-bottom: 15px; position: relative; }
        .item-title { font-weight: 800; color: #2b3674; font-size: 0.95rem; line-height: 1.2; margin-bottom: 8px; }
        .item-meta { font-size: 0.8rem; color: #8f9bba; display: flex; gap: 10px; flex-wrap: wrap; }
        .badge-secao { background: #e0eaff; color: #4318FF; padding: 4px 8px; border-radius: 6px; font-weight: 700; }
        
        .vaga-destaque { background: #fff3e0; color: #e65100; border: 2px dashed #ffb74d; padding: 8px; border-radius: 10px; font-weight: 800; text-align: center; margin-bottom: 10px; font-size: 1.1rem; }

        .btn-loja-ok { background: #e8f5e9; color: #2e7d32; border: 1px solid #c8e6c9; border-radius: 10px; padding: 10px; font-weight: 700; width: 48%; }
        .btn-loja-falta { background: #ffebee; color: #c62828; border: 1px solid #ffcdd2; border-radius: 10px; padding: 10px; font-weight: 700; width: 48%; }
        .btn-inventariado { background: #e8f5e9; color: #2e7d32; border: 1px solid #c8e6c9; border-radius: 10px; padding: 10px; font-weight: 700; width: 100%; transition: all 0.2s; }
    </style>
</head>
<body>

    <header class="main-header text-center">
        <div class="container d-flex justify-content-between align-items-center">
            <button class="btn btn-link text-white p-0" onclick="window.location.href='index.html'"><i class="bi bi-chevron-left fs-4"></i></button>
            <h5 class="m-0 fw-bold">Auditoria Online</h5>
            <div style="width: 24px;"></div>
        </div>
    </header>

    <div class="container content-container">
        
        <ul class="nav nav-pills nav-justified mb-4 shadow-sm rounded-4 bg-white p-1" id="rupturaTabs" role="tablist">
            <li class="nav-item"><button class="nav-link active" data-bs-toggle="pill" data-bs-target="#tab-loja" type="button"><i class="bi bi-shop"></i> Loja</button></li>
            <li class="nav-item"><button class="nav-link" data-bs-toggle="pill" data-bs-target="#tab-deposito" type="button"><i class="bi bi-box-seam"></i> Depósito</button></li>
            <li class="nav-item"><button class="nav-link" data-bs-toggle="pill" data-bs-target="#tab-inventario" type="button"><i class="bi bi-clipboard-data"></i> Relatório</button></li>
        </ul>

        <div class="tab-content">
            <div class="tab-pane fade show active" id="tab-loja">
                <div class="glass-card border-top border-4 border-primary">
                    <div class="section-title"><i class="bi bi-cloud-upload text-primary"></i> Importar Ruptura</div>
                    <textarea class="form-control mb-3" id="input-importacao" rows="3" placeholder="GTIN | Nome | Estoque | Seção"></textarea>
                    <div class="row g-2">
                        <div class="col-8"><button class="btn-action btn-import" id="btn-importar">Importar</button></div>
                        <div class="col-4"><button class="btn-action btn-clear" id="btn-zerar-nuvem">Limpar</button></div>
                    </div>
                </div>
                <div class="glass-card">
                    <div class="section-title mb-3"><i class="bi bi-search text-info"></i> Verificar na Gôndola <span class="badge bg-primary ms-auto" id="contador-loja">0</span></div>
                    <div id="lista-loja"></div>
                </div>
            </div>

            <div class="tab-pane fade" id="tab-deposito">
                <div class="glass-card border-top border-4 border-warning">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <div class="section-title mb-0"><i class="bi bi-boxes text-warning"></i> Depósito</div>
                        <button class="btn btn-print-80" id="btn-print-80"><i class="bi bi-printer-fill"></i> Elgin</button>
                    </div>
                    <div id="lista-deposito"></div>
                </div>
            </div>

            <div class="tab-pane fade" id="tab-inventario">
                <div class="glass-card border-top border-4 border-danger">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <div class="section-title mb-0"><i class="bi bi-clipboard-x text-danger"></i> Ajuste</div>
                        <button class="btn btn-print-a4" id="btn-print-a4"><i class="bi bi-printer-fill"></i> Relatório A4</button>
                    </div>
                    <div id="lista-inventario"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, deleteDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyA_i9BkvMFIXxTTtJA6dyFc2HLXKP-TmHU",
            authDomain: "wms-h7.firebaseapp.com",
            projectId: "wms-h7",
            storageBucket: "wms-h7.firebasestorage.app",
            messagingSenderId: "274655939351",
            appId: "1:274655939351:web:533f7b66d3f421596b8552"
         };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let auditoriaCache = [];
        let vagasCache = {};
// ==========================================
        // 6. IMPRESSÃO (ATUALIZADA PARA NUVEM)
        // ==========================================
        document.getElementById('btn-print-80').onclick = () => {
            const depo = auditoriaCache.filter(i => i.status === 'pendente_deposito');
            if(depo.length === 0) return alert("Não há itens pendentes no depósito para imprimir.");

            let conteudo = `
            <html><head><style>
                @page { size: 80mm auto; margin: 0; }
                body { font-family: 'Courier New', Courier, monospace; width: 72mm; margin: 0 auto; padding: 10px 0; font-size: 12px; color: #000; }
                h2 { text-align: center; font-size: 16px; margin-bottom: 5px; border-bottom: 1px dashed #000; padding-bottom: 5px; }
                .item { border-bottom: 1px dashed #000; padding: 8px 0; }
                .vaga { font-size: 14px; font-weight: bold; margin-bottom: 4px; }
                .nome { font-size: 11px; margin-bottom: 4px; }
                .gtin { font-size: 10px; }
                .check { float: right; border: 1px solid #000; width: 12px; height: 12px; margin-top: 2px; }
            </style></head><body>
                <h2>BUSCA NO DEPÓSITO<br>WMS H-07</h2>
                <div style="text-align: center; font-size: 10px; margin-bottom: 10px;">Data: ${new Date().toLocaleDateString('pt-BR')}</div>
            `;

            depo.forEach(item => {
                const vagas = vagasCache[item.gtin] ? vagasCache[item.gtin].join(', ') : 'SEM VAGA';
                conteudo += `
                <div class="item">
                    <div class="vaga">VAGA: ${vagas} <div class="check"></div></div>
                    <div class="nome">${item.nome.substring(0, 35)}</div>
                    <div class="gtin">GTIN: ${item.gtin} | Qtd Sist: ${item.estoque}</div>
                </div>`;
            });

            conteudo += `<div style="text-align: center; margin-top: 10px; font-size: 10px;">Total de Itens: ${depo.length}<br>--------------------------</div>
            <script>window.print(); setTimeout(() => window.close(), 500);<\/script></body></html>`;

            const win = window.open('', '', 'width=400,height=600');
            win.document.write(conteudo);
        };

        document.getElementById('btn-print-a4').onclick = () => {
            if(auditoriaCache.length === 0) return alert("Nenhum dado sincronizado hoje.");

            const totalImportado = auditoriaCache.length;
            const totalLoja = auditoriaCache.filter(i => i.status === 'na_loja').length;
            const totalDeposito = auditoriaCache.filter(i => i.status === 'no_deposito').length;
            const totalInventario = auditoriaCache.filter(i => i.status === 'inventario' || i.status === 'concluido').length;

            const itensPerdidos = auditoriaCache.filter(i => i.status === 'inventario' || i.status === 'concluido');
            const porSecao = {};
            itensPerdidos.forEach(i => {
                if(!porSecao[i.secao]) porSecao[i.secao] = [];
                porSecao[i.secao].push(i);
            });

            let conteudo = `
            <html><head><style>
                @page { size: A4; margin: 15mm; }
                body { font-family: Arial, sans-serif; font-size: 12px; color: #333; }
                h2 { text-align: center; color: #034EA1; border-bottom: 2px solid #034EA1; padding-bottom: 10px; }
                .resumo-box { display: flex; justify-content: space-between; background: #f4f7fe; padding: 15px; border-radius: 8px; margin-bottom: 20px; font-weight: bold; }
                .resumo-item { text-align: center; }
                .resumo-item span { display: block; font-size: 18px; color: #034EA1; }
                h4 { background: #2b3674; color: white; padding: 5px 10px; margin-top: 20px; }
                table { width: 100%; border-collapse: collapse; margin-bottom: 10px; }
                th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
                th { background-color: #f2f2f2; }
            </style></head><body>
                <h2>RELATÓRIO DE AUDITORIA DE RUPTURA - WMS H-07</h2>
                <p style="text-align: right;">Data de Emissão: ${new Date().toLocaleString('pt-BR')}</p>
                <div class="resumo-box">
                    <div class="resumo-item">Importados<span>${totalImportado}</span></div>
                    <div class="resumo-item">Achados na Loja<span style="color: green;">${totalLoja}</span></div>
                    <div class="resumo-item">Achados no Depósito<span style="color: orange;">${totalDeposito}</span></div>
                    <div class="resumo-item">Divergências Tratadas<span style="color: red;">${totalInventario}</span></div>
                </div>
                <h3>DETALHAMENTO DE DIVERGÊNCIAS AJUSTADAS</h3>
            `;

            if(itensPerdidos.length === 0) {
                conteudo += `<p>Parabéns! Todos os itens reportados foram localizados na loja ou no depósito.</p>`;
            } else {
                for(let secao in porSecao) {
                    conteudo += `<h4>SEÇÃO: ${secao} (${porSecao[secao].length} itens)</h4><table><tr><th width="15%">GTIN</th><th width="65%">Produto</th><th width="20%">Estoque Sist.</th></tr>`;
                    porSecao[secao].forEach(item => {
                        const checkmark = item.status === 'concluido' ? ' (Ajustado)' : '';
                        conteudo += `<tr><td>${item.gtin}</td><td>${item.nome}${checkmark}</td><td>${item.estoque}</td></tr>`;
                    });
                    conteudo += `</table>`;
                }
            }

            conteudo += `<br><br><br><div style="text-align: center; border-top: 1px solid #000; width: 300px; margin: 0 auto; padding-top: 5px;">Visto Gerência / Prevenção</div>
            <script>window.print(); setTimeout(() => window.close(), 500);<\/script></body></html>`;

            const win = window.open('', '', 'width=800,height=600');
            win.document.write(conteudo);
        };
        // 1. MONITORAR DADOS DA NUVEM EM TEMPO REAL
        function initRealtime() {
            // Monitora Auditoria
            onSnapshot(collection(db, "auditoria_ruptura"), (snap) => {
                auditoriaCache = [];
                snap.forEach(d => auditoriaCache.push({ id: d.id, ...d.data() }));
                renderizar();
            });

            // Monitora Vagas do Depósito para o cruzamento
            onSnapshot(collection(db, "inventario_ativo"), (snap) => {
                vagasCache = {};
                snap.forEach(d => {
                    const data = d.data();
                    if(data.status === "ocupada") {
                        if(!vagasCache[data.gtin]) vagasCache[data.gtin] = [];
                        vagasCache[data.gtin].push(data.vaga_id);
                    }
                });
                renderizar();
            });
        }

        // 2. IMPORTAR PARA O FIREBASE (DISPONÍVEL EM TODOS)
        document.getElementById('btn-importar').onclick = async () => {
            const texto = document.getElementById('input-importacao').value;
            if(!texto.trim()) return alert("Cole os dados!");

            const linhas = texto.split('\n');
            const btn = document.getElementById('btn-importar');
            btn.innerHTML = "Sincronizando...";
            btn.disabled = true;

            for(let linha of linhas) {
                const colunas = linha.trim().split('\t');
                if(colunas.length >= 2) {
                    await addDoc(collection(db, "auditoria_ruptura"), {
                        gtin: colunas[0].trim(),
                        nome: colunas[1].trim(),
                        estoque: colunas[2] || '0',
                        secao: colunas[3] || 'GERAL',
                        status: 'pendente_loja',
                        data: new Date().toISOString()
                    });
                }
            }
            document.getElementById('input-importacao').value = "";
            btn.innerHTML = "Processar e Sincronizar";
            btn.disabled = false;
        };

        // 3. AÇÕES DE MUDANÇA DE STATUS (VAI PARA TODOS OS APARELHOS)
        window.mudarStatus = async (docId, novoStatus) => {
            await updateDoc(doc(db, "auditoria_ruptura", docId), { status: novoStatus });
        };

        // 4. LIMPAR TUDO NA NUVEM
        document.getElementById('btn-zerar-nuvem').onclick = async () => {
            if(!confirm("Isso apagará a lista em TODOS os aparelhos. Confirma?")) return;
            const snap = await getDocs(collection(db, "auditoria_ruptura"));
            snap.forEach(async (d) => await deleteDoc(doc(db, "auditoria_ruptura", d.id)));
        };

        // 5. RENDERIZAÇÃO
        function renderizar() {
            const loja = auditoriaCache.filter(i => i.status === 'pendente_loja');
            const depo = auditoriaCache.filter(i => i.status === 'pendente_deposito');
            const inv = auditoriaCache.filter(i => i.status === 'inventario');

            document.getElementById('contador-loja').innerText = loja.length;

            document.getElementById('lista-loja').innerHTML = loja.map(i => `
                <div class="item-card shadow-sm">
                    <div class="d-flex justify-content-between mb-1"><span class="badge-secao">${i.secao}</span><small>Estoque: ${i.estoque}</small></div>
                    <div class="item-title">${i.nome}</div>
                    <div class="d-flex justify-content-between">
                        <button class="btn-loja-ok" onclick="mudarStatus('${i.id}', 'na_loja')">Na Gôndola</button>
                        <button class="btn-loja-falta" onclick="mudarStatus('${i.id}', 'pendente_deposito')">Não Localizado</button>
                    </div>
                </div>`).join('');

            document.getElementById('lista-deposito').innerHTML = depo.map(i => `
                <div class="item-card shadow-sm border-start border-warning border-4">
                    <div class="vaga-destaque">${vagasCache[i.gtin] ? vagasCache[i.gtin].join(', ') : 'SEM VAGA'}</div>
                    <div class="item-title">${i.nome}</div>
                    <div class="d-flex justify-content-between">
                        <button class="btn-loja-ok" onclick="mudarStatus('${i.id}', 'no_deposito')">Achei</button>
                        <button class="btn-loja-falta" onclick="mudarStatus('${i.id}', 'inventario')">Perdido</button>
                    </div>
                </div>`).join('');

            document.getElementById('lista-inventario').innerHTML = inv.map(i => `
                <div class="item-card shadow-sm border-start border-danger border-4">
                    <div class="item-title">${i.nome}</div>
                    <button class="btn-inventariado" onclick="mudarStatus('${i.id}', 'concluido')">Marcar como Ajustado</button>
                </div>`).join('');
        }

        initRealtime();
    </script>
</body>
</html>
